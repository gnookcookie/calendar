<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>교사용 바이브 캘린더</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body, html { font-family: 'Inter', sans-serif; margin: 0; padding: 0; background: transparent !important; overflow: hidden; height: 100vh; width: 100vw; }
        #root { height: 100%; background: transparent; }
        .drag { -webkit-app-region: drag; }
        .no-drag { -webkit-app-region: no-drag !important; }
        .pointer-none { pointer-events: none; } /* 바탕화면 통과용 */
        .pointer-auto { pointer-events: auto; } /* UI 클릭용 */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp, deleteApp, getApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        window.FirebaseSDK = { initializeApp, deleteApp, getApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithPopup, GoogleAuthProvider, signOut, getFirestore, collection, doc, setDoc, onSnapshot };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const TAG_COLORS = {
            '수업': 'bg-blue-500/30 text-blue-200 border-blue-500/40',
            '업무': 'bg-red-500/30 text-red-200 border-red-500/40',
            '개인': 'bg-emerald-500/30 text-emerald-200 border-emerald-500/40',
            '기타': 'bg-purple-500/30 text-purple-200 border-purple-500/40'
        };

        function App() {
            const today = new Date();
            const [currentDate, setCurrentDate] = useState(new Date(today.getFullYear(), today.getMonth(), 1));
            const [events, setEvents] = useState({});
            const [filterTag, setFilterTag] = useState('All');
            const [opacity, setOpacity] = useState(0.85); // 투명도 초기값
            const [showSettings, setShowSettings] = useState(false);
            const [addingDate, setAddingDate] = useState(null);
            const [inputText, setInputText] = useState('');
            const [selectedTag, setSelectedTag] = useState('수업');
            const [user, setUser] = useState(null);

            const isElectron = window.process && window.process.type === 'renderer';
            const savedConfig = localStorage.getItem('custom_firebase_config');
            const [fbConfig, setFbConfig] = useState(savedConfig ? JSON.parse(savedConfig) : null);

            // [마우스 통과 로직]
            const setIgnore = (bool) => {
                if (isElectron) window.require('electron').ipcRenderer.send('set-ignore-mouse', bool);
            };

            // [Firebase 연동] - 기존 선생님 로직 유지
            useEffect(() => {
                if (!fbConfig || !window.FirebaseSDK) return;
                const { initializeApp, getAuth, onAuthStateChanged, signInAnonymously } = window.FirebaseSDK;
                const app = initializeApp(fbConfig);
                const auth = getAuth(app);
                return onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    if (!u) signInAnonymously(auth);
                });
            }, [fbConfig]);

            useEffect(() => {
                if (!user || !fbConfig) return;
                const { getFirestore, collection, onSnapshot } = window.FirebaseSDK;
                const unsub = onSnapshot(collection(getFirestore(), 'artifacts', fbConfig.appId, 'users', user.uid, 'days'), (snap) => {
                    const newEvs = {};
                    snap.forEach(doc => { newEvs[doc.id] = doc.data().items || []; });
                    setEvents(newEvs);
                });
                return () => unsub();
            }, [user, fbConfig]);

            const saveEvents = async (dateStr, items) => {
                if (!user) return;
                const { getFirestore, doc, setDoc } = window.FirebaseSDK;
                await setDoc(doc(getFirestore(), 'artifacts', fbConfig.appId, 'users', user.uid, 'days', dateStr), { items });
            };

            // [크기 조절 드래그 로직]
            const handleResize = (e) => {
                if (!isElectron) return;
                const startX = e.clientX; const startY = e.clientY;
                const startW = window.innerWidth; const startH = window.innerHeight;
                const onMove = (me) => {
                    window.require('electron').ipcRenderer.send('resize-window', { 
                        width: startW + (me.clientX - startX), 
                        height: startH + (me.clientY - startY) 
                    });
                };
                const onUp = () => { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
                window.addEventListener('mousemove', onMove); window.addEventListener('mouseup', onUp);
            };

            const renderDays = () => {
                const year = currentDate.getFullYear(); const month = currentDate.getMonth();
                const days = [];
                const firstDay = new Date(year, month, 1).getDay();
                const daysInMonth = new Date(year, month + 1, 0).getDate();

                for (let i = 0; i < firstDay; i++) days.push(<div key={`p-${i}`} className="opacity-5 bg-white/10 rounded-2xl"></div>);
                for (let d = 1; d <= daysInMonth; d++) {
                    const dStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                    const dayEvs = (events[dStr] || []).filter(e => filterTag === 'All' || e.tag === filterTag);
                    days.push(
                        <div key={d} className="min-h-[100px] p-2 bg-white/5 border border-white/5 rounded-2xl relative group hover:bg-white/10 transition-all">
                            <div className="flex justify-between items-start mb-1">
                                <span className={`text-xs font-bold ${dStr === `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}` ? 'bg-blue-600 px-1.5 rounded-full' : 'text-white/40'}`}>{d}</span>
                                <button onClick={() => setAddingDate(dStr)} className="opacity-0 group-hover:opacity-100 text-white/40 hover:text-white">+</button>
                            </div>
                            <div className="space-y-1 overflow-y-auto h-16 no-scrollbar">
                                {dayEvs.map(ev => (
                                    <div key={ev.id} className={`text-[10px] p-1 rounded border ${TAG_COLORS[ev.tag]} flex justify-between`}>
                                        <span className="truncate">{ev.text}</span>
                                        <button onClick={() => saveEvents(dStr, events[dStr].filter(item => item.id !== ev.id))} className="opacity-0 group-hover:opacity-100 ml-1">×</button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    );
                }
                return days;
            };

            return (
                <div className="h-screen w-screen flex items-center justify-center pointer-none" onMouseMove={() => setIgnore(true)}>
                    <div 
                        onMouseEnter={() => setIgnore(false)}
                        onMouseLeave={() => setIgnore(true)}
                        style={{ backgroundColor: `rgba(15, 23, 42, ${opacity})` }}
                        className={`w-[95%] h-[95%] flex flex-col rounded-[3rem] shadow-2xl overflow-hidden border border-white/10 backdrop-blur-xl pointer-auto relative transition-all duration-300`}
                    >
                        {/* 헤더 */}
                        <div className="drag p-6 flex items-center justify-between bg-white/5 cursor-move">
                            <div className="no-drag flex items-center gap-6">
                                <h1 className="text-3xl font-black text-white tracking-tighter">{currentDate.getFullYear()}년 {currentDate.getMonth()+1}월</h1>
                                <div className="flex gap-2 bg-black/20 p-1 rounded-xl">
                                    {['All', ...Object.keys(TAG_COLORS)].map(t => (
                                        <button key={t} onClick={() => setFilterTag(t)} className={`px-3 py-1 rounded-lg text-[10px] font-bold transition-all ${filterTag === t ? 'bg-white/20 text-white' : 'text-white/30'}`}>{t}</button>
                                    ))}
                                </div>
                            </div>
                            <div className="no-drag flex items-center gap-4">
                                <button onClick={() => setShowSettings(true)} className="p-2 text-white/30 hover:text-white">⚙️</button>
                                <div className="flex bg-black/40 rounded-xl p-1">
                                    <button onClick={() => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth()-1, 1))} className="p-2 text-white/30 hover:text-white">◀</button>
                                    <button onClick={() => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth()+1, 1))} className="p-2 text-white/30 hover:text-white">▶</button>
                                </div>
                            </div>
                        </div>

                        {/* 달력 본문 */}
                        <div className="flex-1 p-6 overflow-y-auto custom-scrollbar no-drag">
                            <div className="grid grid-cols-7 gap-3 h-full">
                                {renderDays()}
                            </div>
                        </div>

                        {/* 크기 조절 손잡이 */}
                        <div onMouseDown={handleResize} className="absolute bottom-4 right-4 w-6 h-6 cursor-nwse-resize flex items-center justify-center text-white/10 hover:text-white/40">◢</div>

                        {/* 일정 추가 팝업 */}
                        {addingDate && (
                            <div className="absolute inset-0 bg-black/60 flex items-center justify-center z-50 no-drag">
                                <div className="bg-slate-900 p-6 rounded-[2rem] border border-white/10 w-80 shadow-2xl">
                                    <h3 className="text-white font-bold mb-4">{addingDate} 일정 추가</h3>
                                    <input autoFocus value={inputText} onChange={e => setInputText(e.target.value)} className="w-full bg-black/40 border border-white/10 p-3 rounded-xl text-white mb-4 outline-none" placeholder="내용 입력"/>
                                    <div className="flex gap-2 mb-6">
                                        {Object.keys(TAG_COLORS).map(t => (
                                            <button key={t} onClick={() => setSelectedTag(t)} className={`flex-1 py-1 rounded-lg text-[10px] ${selectedTag === t ? TAG_COLORS[t] : 'bg-white/5 text-white/30'}`}>{t}</button>
                                        ))}
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={() => {
                                            const id = Date.now().toString();
                                            saveEvents(addingDate, [...(events[addingDate] || []), { id, text: inputText, tag: selectedTag }]);
                                            setAddingDate(null); setInputText('');
                                        }} className="flex-1 py-3 bg-blue-600 rounded-xl font-bold">저장</button>
                                        <button onClick={() => setAddingDate(null)} className="flex-1 py-3 bg-white/5 rounded-xl text-white/40">취소</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 설정 팝업 (투명도) */}
                        {showSettings && (
                            <div className="absolute inset-0 bg-black/80 flex items-center justify-center z-[60] no-drag">
                                <div className="bg-slate-900 p-8 rounded-[2.5rem] border border-white/10 w-96 shadow-2xl">
                                    <h2 className="text-xl font-black mb-6 text-white">설정</h2>
                                    <div className="mb-6">
                                        <label className="text-xs text-white/40 block mb-2">배경 투명도: {Math.round(opacity * 100)}%</label>
                                        <input type="range" min="0.1" max="1" step="0.05" value={opacity} onChange={e => setOpacity(parseFloat(e.target.value))} className="w-full h-1 bg-white/10 rounded-lg appearance-none cursor-pointer accent-blue-600"/>
                                    </div>
                                    <button onClick={() => setShowSettings(false)} className="w-full py-4 bg-white/5 rounded-2xl text-white/40 hover:text-white font-bold transition-all">닫기</button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>8
