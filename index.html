<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>바이브 캘린더 Pro - 최종</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body, html { font-family: 'Pretendard', sans-serif; margin: 0; background: transparent !important; height: 100vh; width: 100vw; overflow: hidden; }
        @media (min-width: 768px) { .drag-area { -webkit-app-region: drag; } .no-drag { -webkit-app-region: no-drag !important; } }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, writeBatch } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        window.FirebaseSDK = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut, getFirestore, collection, doc, setDoc, onSnapshot, writeBatch };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        const TAGS = ['수업', '업무', '개인', '기타'];
        const TAG_COLORS = { '수업': 'bg-blue-500/30 text-blue-100 border-blue-500/40', '업무': 'bg-red-500/30 text-red-100 border-red-500/40', '개인': 'bg-emerald-500/30 text-emerald-100 border-emerald-500/40', '기타': 'bg-slate-500/30 text-slate-100 border-slate-500/40' };
        const BASIC_HOLIDAYS = { '01-01': '신정', '03-01': '삼일절', '05-05': '어린이날', '06-06': '현충일', '08-15': '광복절', '10-03': '개천절', '10-09': '한글날', '12-25': '성탄절' };

        function App() {
            const today = new Date();
            const [currentDate, setCurrentDate] = useState(new Date(today.getFullYear(), today.getMonth(), 1));
            const [events, setEvents] = useState({});
            const [customHolidays, setCustomHolidays] = useState({});
            const [user, setUser] = useState(null);
            const [showSettings, setShowSettings] = useState(false);
            const [addingDate, setAddingDate] = useState(null);
            const [selectedMobileDate, setSelectedMobileDate] = useState(null);
            const [inputText, setInputText] = useState('');
            const [selectedTag, setSelectedTag] = useState('수업');
            
            // 스마트 붙여넣기용 상태
            const [rawConfig, setRawConfig] = useState('');

            const [touchStartX, setTouchStartX] = useState(null);
            const [dragOffset, setDragOffset] = useState(0);
            const [isDragging, setIsDragging] = useState(false);

            let fbConfig = null;
            try {
                fbConfig = JSON.parse(localStorage.getItem('custom_firebase_config'));
            } catch(e) {
                localStorage.removeItem('custom_firebase_config'); // 에러 난 찌꺼기 즉시 삭제
            }
            const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

            // 파이어베이스 초기화 및 데이터 동기화
            useEffect(() => {
                if (!fbConfig || !window.FirebaseSDK) return;
                const { initializeApp, getAuth, onAuthStateChanged, getFirestore, collection, onSnapshot } = window.FirebaseSDK;
                const app = initializeApp(fbConfig);
                const auth = getAuth(app);
                const db = getFirestore(app);

                return onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    if (u) {
                        onSnapshot(collection(db, 'artifacts', fbConfig.appId, 'users', u.uid, 'days'), (snap) => {
                            const evs = {}; const hols = {};
                            snap.forEach(doc => {
                                const data = doc.data();
                                evs[doc.id] = data.items || [];
                                if (data.holidayName) hols[doc.id] = data.holidayName;
                            });
                            setEvents(evs); setCustomHolidays(hols);
                        });
                    }
                });
            }, [fbConfig]);

            // 스마트 파싱 함수: 붙여넣은 텍스트에서 키값 추출
            const handleSmartConfigSave = () => {
                try {
                    const configObj = {};
                    const keys = ['apiKey', 'authDomain', 'projectId', 'storageBucket', 'messagingSenderId', 'appId'];
                    keys.forEach(key => {
                        const regex = new RegExp(`${key}:\\s*["']([^"']+)["']`);
                        const match = rawConfig.match(regex);
                        if (match) configObj[key] = match[1];
                    });

                    if (Object.keys(configObj).length < 6) {
                        alert("파이어베이스 코드가 올바르지 않거나 일부 항목이 누락되었습니다.");
                        return;
                    }
                    localStorage.setItem('custom_firebase_config', JSON.stringify(configObj));
                    window.location.reload();
                } catch (e) {
                    alert("코드 파싱 중 오류가 발생했습니다.");
                }
            };

            // 스와이프 로직
            const onTouchStart = (e) => { setTouchStartX(e.targetTouches[0].clientX); setIsDragging(true); };
            const onTouchMove = (e) => { if (!isDragging || touchStartX === null) return; setDragOffset(e.targetTouches[0].clientX - touchStartX); };
            const onTouchEnd = () => {
                setIsDragging(false);
                if (dragOffset > 70) setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1));
                else if (dragOffset < -70) setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1));
                setDragOffset(0); setTouchStartX(null);
            };

            const renderDays = () => {
                const year = currentDate.getFullYear(); const month = currentDate.getMonth();
                const days = [];
                const firstDay = new Date(year, month, 1).getDay();
                const daysInMonth = new Date(year, month + 1, 0).getDate();

                for (let i = 0; i < firstDay; i++) days.push(<div key={`p-${i}`} className="opacity-5 bg-white/10 rounded-lg md:rounded-2xl"></div>);
                for (let d = 1; d <= daysInMonth; d++) {
                    const dStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                    const dow = new Date(year, month, d).getDay();
                    const basicHol = BASIC_HOLIDAYS[`${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`];
                    const customHol = customHolidays[dStr];
                    const isToday = dStr === todayStr;
                    const isRed = dow === 0 || basicHol || customHol;

                    days.push(
                        <div key={d} onClick={() => window.innerWidth < 768 && setSelectedMobileDate(dStr)} className="min-h-[75px] md:min-h-[125px] p-1 md:p-2 bg-white/5 border border-white/5 rounded-lg md:rounded-2xl relative flex flex-col no-drag hover:bg-white/10 transition-all cursor-pointer overflow-hidden">
                            <div className="flex justify-between items-center h-4 md:h-6 mb-1">
                                <div className="flex items-center gap-1 overflow-hidden">
                                    <span className={`text-[9px] md:text-xs font-black px-1.5 rounded ${isToday ? 'bg-blue-600 text-white shadow-md' : isRed ? 'text-red-400' : dow === 6 ? 'text-blue-400' : 'text-white/40'}`}>{d}</span>
                                    {(basicHol || customHol) && <span className="text-[7.5px] md:text-[10px] text-red-500 font-bold truncate">{basicHol || customHol}</span>}
                                </div>
                            </div>
                            <div className="space-y-[1px] md:space-y-1 flex-1 overflow-y-auto no-scrollbar pointer-events-none">
                                {(events[dStr] || []).map(ev => (
                                    <div key={ev.id} className={`text-[8.5px] md:text-[10px] px-1 py-[1px] md:py-1 rounded border ${TAG_COLORS[ev.tag]} truncate text-center font-bold`}>
                                        {ev.text}
                                    </div>
                                ))}
                            </div>
                        </div>
                    );
                }
                return days;
            };

            return (
                <div className="h-screen w-screen flex items-center justify-center bg-slate-950/80 backdrop-blur-xl md:rounded-[3rem] overflow-hidden border border-white/10 relative">
                    <div className="flex flex-col w-full h-full">
                        <div className="drag-area p-6 flex justify-between items-center bg-white/5 no-drag cursor-move">
                            <h1 className="text-2xl md:text-3xl font-black text-white italic tracking-tighter">{currentDate.getFullYear()}년 {currentDate.getMonth()+1}월</h1>
                            <div className="flex gap-2">
                                <button onClick={() => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth()-1, 1))} className="p-2 text-white/40 hover:text-white">◀</button>
                                <button onClick={() => setCurrentDate(new Date(today.getFullYear(), today.getMonth(), 1))} className="px-4 py-1 bg-white/10 rounded-xl text-white text-sm font-bold">오늘</button>
                                <button onClick={() => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth()+1, 1))} className="p-2 text-white/40 hover:text-white">▶</button>
                                <button onClick={() => setShowSettings(true)} className="ml-2 text-xl text-white/60">⚙️</button>
                            </div>
                        </div>

                        <div 
                            className="flex-1 p-2 md:p-8 pt-0 overflow-x-hidden relative no-drag"
                            onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}
                        >
                            <div className="grid grid-cols-7 gap-1 md:gap-3 text-center py-4 text-[10px] font-black text-white/20 uppercase">
                                {['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d => <div key={d}>{d}</div>)}
                            </div>
                            <div className="grid grid-cols-7 gap-1 md:gap-3 transition-transform" style={{ transform: `translateX(${dragOffset}px)` }}>
                                {renderDays()}
                            </div>
                        </div>
                    </div>

                    {!fbConfig || showSettings ? (
                        <div className="fixed inset-0 z-50 bg-slate-900/95 flex items-center justify-center p-6 no-drag backdrop-blur-3xl">
                            <div className="bg-slate-800 p-8 rounded-[2rem] border border-white/10 w-full max-w-xl shadow-2xl">
                                <h2 className="text-2xl font-black text-white mb-6">데이터 연결 설정</h2>
                                <p className="text-white/40 text-sm mb-4">파이어베이스에서 복사한 `firebaseConfig` 코드를 아래에 통째로 붙여넣으세요.</p>
                                <textarea 
                                    value={rawConfig}
                                    onChange={(e) => setRawConfig(e.target.value)}
                                    placeholder={`const firebaseConfig = {\n  apiKey: "...",\n  projectId: "...",\n  ...\n};`}
                                    className="w-full h-48 bg-black/40 border border-white/10 p-4 rounded-xl text-blue-300 text-xs font-mono mb-6 outline-none focus:border-blue-500"
                                />
                                <div className="flex gap-3">
                                    <button onClick={handleSmartConfigSave} className="flex-1 py-4 bg-blue-600 text-white font-black rounded-xl shadow-lg">연결 및 저장</button>
                                    <button onClick={() => setShowSettings(false)} className="px-6 py-4 bg-white/5 text-white/40 font-black rounded-xl">닫기</button>
                                </div>
                                <div className="mt-8 pt-6 border-t border-white/5 flex items-center justify-between">
                                    <span className="text-white/30 text-xs font-bold">{user ? `접속 계정: ${user.email || '익명'}` : '로그인되지 않음'}</span>
                                    {!user && <button onClick={async () => { const { getAuth, signInWithPopup, GoogleAuthProvider } = window.FirebaseSDK; await signInWithPopup(getAuth(), new GoogleAuthProvider()); }} className="text-xs text-blue-400 font-bold px-3 py-1 bg-white/5 rounded-lg">구글 로그인</button>}
                                </div>
                            </div>
                        </div>
                    ) : null}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
