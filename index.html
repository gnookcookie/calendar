<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>바이브 캘린더 Pro - 선생님 전용</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body, html { font-family: 'Inter', sans-serif; margin: 0; background: transparent !important; overflow: hidden; height: 100vh; width: 100vw; }
        .drag-area { -webkit-app-region: drag; }
        .no-drag { -webkit-app-region: no-drag !important; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        input[type="checkbox"] { accent-color: #3b82f6; width: 16px; height: 16px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        window.FirebaseSDK = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, collection, doc, setDoc, onSnapshot };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const BASIC_HOLIDAYS = { '01-01': '신정', '03-01': '삼일절', '05-05': '어린이날', '06-06': '현충일', '08-15': '광복절', '10-03': '개천절', '10-09': '한글날', '12-25': '성탄절' };
        const TAG_COLORS = { '수업': 'bg-blue-500/30 text-blue-100 border-blue-500/40', '업무': 'bg-red-500/30 text-red-100 border-red-500/40', '개인': 'bg-emerald-500/30 text-emerald-100 border-emerald-500/40', '기타': 'bg-slate-500/30 text-slate-100 border-slate-500/40' };
        const THEMES = [{ id: 'slate', bg: 'rgba(15, 23, 42, ' }, { id: 'midnight', bg: 'rgba(9, 9, 11, ' }, { id: 'ocean', bg: 'rgba(23, 37, 84, ' }];

        function App() {
            const calendarRef = useRef(null);
            const today = new Date();
            const [currentDate, setCurrentDate] = useState(new Date(today.getFullYear(), today.getMonth(), 1));
            const [events, setEvents] = useState({}); // 일반 일정 { 'YYYY-MM-DD': [] }
            const [customHolidays, setCustomHolidays] = useState({}); // 사용자 휴일 { 'YYYY-MM-DD': '명칭' }
            const [opacity, setOpacity] = useState(0.85);
            const [currentThemeIdx, setCurrentThemeIdx] = useState(0);
            const [addingDate, setAddingDate] = useState(null);
            
            // 입력 폼 상태
            const [inputText, setInputText] = useState('');
            const [selectedTag, setSelectedTag] = useState('수업');
            const [endDate, setEndDate] = useState(''); // 반복 종료일
            const [repeatDays, setRepeatDays] = useState([]); // [0,1,2,3,4,5,6]
            const [isHolidayEntry, setIsHolidayEntry] = useState(false);

            const fbConfig = JSON.parse(localStorage.getItem('custom_firebase_config'));
            const isElectron = window.process && window.process.type === 'renderer';
            const theme = THEMES[currentThemeIdx];

            // --- [1. 마우스 통과 로직] ---
            useEffect(() => {
                if (!isElectron) return;
                const { ipcRenderer } = window.require('electron');
                const handleMove = (e) => {
                    if (!calendarRef.current) return;
                    const r = calendarRef.current.getBoundingClientRect();
                    const isInside = e.clientX >= r.left && e.clientX <= r.right && e.clientY >= r.top && e.clientY <= r.bottom;
                    ipcRenderer.send('set-ignore-mouse', !isInside);
                };
                window.addEventListener('mousemove', handleMove);
                return () => window.removeEventListener('mousemove', handleMove);
            }, []);

            // --- [2. Firebase 실시간 동기화] ---
            useEffect(() => {
                if (!fbConfig || !window.FirebaseSDK) return;
                const { initializeApp, getAuth, onAuthStateChanged, signInAnonymously, getFirestore, collection, onSnapshot } = window.FirebaseSDK;
                const app = initializeApp(fbConfig);
                const auth = getAuth(app);
                const db = getFirestore(app);

                return onAuthStateChanged(auth, (u) => {
                    if (u) {
                        onSnapshot(collection(db, 'artifacts', fbConfig.appId, 'users', u.uid, 'days'), (snap) => {
                            const evs = {}; const hols = {};
                            snap.forEach(doc => {
                                const data = doc.data();
                                evs[doc.id] = data.items || [];
                                if (data.holidayName) hols[doc.id] = data.holidayName;
                            });
                            setEvents(evs); setCustomHolidays(hols);
                        });
                    } else { signInAnonymously(auth).catch(()=>{}); }
                });
            }, []);

            const saveToDB = async (dateStr, data) => {
                const { getFirestore, doc, setDoc, getAuth } = window.FirebaseSDK;
                const uid = getAuth().currentUser.uid;
                await setDoc(doc(getFirestore(), 'artifacts', fbConfig.appId, 'users', uid, 'days', dateStr), data, { merge: true });
            };

            // --- [3. 자동 차시 계산 로직] ---
            const getSessionNum = (text, targetDate) => {
                let count = 0;
                // 모든 날짜를 정렬하여 순회하며 카운트
                const sortedDates = Object.keys(events).sort();
                for (const d of sortedDates) {
                    const matched = events[d].filter(e => e.text === text && e.tag === '수업');
                    count += matched.length;
                    if (d === targetDate) break;
                }
                return count;
            };

            // --- [4. 반복 및 저장 로직] ---
            const handleSave = async () => {
                if (!inputText) return;
                
                if (isHolidayEntry) {
                    // 휴일로 저장
                    await saveToDB(addingDate, { holidayName: inputText });
                } else {
                    // 일반 또는 반복 일정 저장
                    const start = new Date(addingDate);
                    const end = endDate ? new Date(endDate) : start;
                    
                    let curr = new Date(start);
                    while (curr <= end) {
                        const dStr = `${curr.getFullYear()}-${String(curr.getMonth()+1).padStart(2,'0')}-${String(curr.getDate()).padStart(2,'0')}`;
                        // 단일 날짜거나, 사용자가 선택한 요일에 해당할 때만 저장
                        if (!endDate || repeatDays.includes(curr.getDay())) {
                            const currentItems = events[dStr] || [];
                            const newItems = [...currentItems, { id: Date.now() + Math.random(), text: inputText, tag: selectedTag }];
                            await saveToDB(dStr, { items: newItems });
                        }
                        curr.setDate(curr.getDate() + 1);
                    }
                }
                resetForm();
            };

            const resetForm = () => {
                setAddingDate(null); setInputText(''); setEndDate(''); setRepeatDays([]); setIsHolidayEntry(false);
            };

            const renderDays = () => {
                const year = currentDate.getFullYear(); const month = currentDate.getMonth();
                const days = [];
                const firstDay = new Date(year, month, 1).getDay();
                const daysInMonth = new Date(year, month + 1, 0).getDate();

                for (let i = 0; i < firstDay; i++) days.push(<div key={`p-${i}`} className="opacity-5 bg-white/10 rounded-3xl"></div>);
                for (let d = 1; d <= daysInMonth; d++) {
                    const dStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                    const dayOfWeek = new Date(year, month, d).getDay();
                    const basicHol = BASIC_HOLIDAYS[`${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`];
                    const customHol = customHolidays[dStr];
                    const isRed = dayOfWeek === 0 || basicHol || customHol;
                    
                    days.push(
                        <div key={d} className="min-h-[115px] p-3 bg-white/5 border border-white/5 rounded-3xl relative group hover:bg-white/10 no-drag transition-all">
                            <div className="flex justify-between items-start mb-1">
                                <div className="flex flex-col">
                                    <span className={`text-xs font-black ${isRed ? 'text-red-400' : dayOfWeek === 6 ? 'text-blue-400' : 'text-white/40'}`}>{d}</span>
                                    {(basicHol || customHol) && <span className="text-[9px] text-red-500 font-bold leading-tight mt-0.5">{basicHol || customHol}</span>}
                                </div>
                                <button onClick={() => setAddingDate(dStr)} className="opacity-0 group-hover:opacity-100 text-white/40 hover:text-white transition-all">+</button>
                            </div>
                            <div className="space-y-1 h-20 overflow-y-auto no-scrollbar">
                                {(events[dStr] || []).map(ev => (
                                    <div key={ev.id} className={`text-[9px] p-1.5 rounded border ${TAG_COLORS[ev.tag] || 'bg-white/10'} flex justify-between group/ev`}>
                                        <span className="truncate">{ev.text} {ev.tag === '수업' ? `(${getSessionNum(ev.text, dStr)}차시)` : ''}</span>
                                        <button onClick={async () => await saveToDB(dStr, { items: events[dStr].filter(i => i.id !== ev.id) })} className="ml-1 opacity-0 group-hover/ev:opacity-100">×</button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    );
                }
                return days;
            };

            return (
                <div className="h-screen w-screen flex items-center justify-center bg-transparent">
                    <div ref={calendarRef} style={{ backgroundColor: `${theme.bg}${opacity})` }} className="w-[98%] h-[98%] flex flex-col rounded-[3.5rem] shadow-2xl border border-white/10 backdrop-blur-xl relative">
                        {/* 헤더 */}
                        <div className="drag-area p-8 flex items-center justify-between bg-white/5 cursor-move">
                            <div className="no-drag flex items-center gap-8 text-white">
                                <h1 className="text-4xl font-black tracking-tighter">{currentDate.getFullYear()}년 {currentDate.getMonth()+1}월</h1>
                                <div className="flex items-center gap-4 bg-black/20 px-5 py-2 rounded-2xl border border-white/5">
                                    <button onClick={() => setCurrentThemeIdx(p => (p+1)%THEMES.length)} className="text-xs font-bold opacity-50 hover:opacity-100">🎨 THEME</button>
                                    <div className="w-[1px] h-3 bg-white/10"></div>
                                    <div className="flex items-center gap-3">
                                        <span className="text-[10px] opacity-30">OPACITY</span>
                                        <input type="range" min="0.1" max="1" step="0.05" value={opacity} onChange={e => setOpacity(e.target.value)} className="w-24 h-1 bg-white/10 rounded-lg appearance-none cursor-pointer accent-blue-600"/>
                                    </div>
                                </div>
                            </div>
                            <div className="no-drag flex bg-black/40 rounded-3xl p-1.5 shadow-2xl border border-white/5">
                                <button onClick={() => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth()-1, 1))} className="p-4 text-white/30 hover:text-white transition-all">◀</button>
                                <button onClick={() => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth()+1, 1))} className="p-4 text-white/30 hover:text-white transition-all">▶</button>
                            </div>
                        </div>

                        <div className="grid grid-cols-7 gap-3 px-12 py-5 text-center text-[10px] font-black uppercase tracking-[0.3em] text-white/10">
                            {['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d => <div key={d}>{d}</div>)}
                        </div>

                        <div className="flex-1 p-12 pt-0 overflow-y-auto custom-scrollbar no-drag">
                            <div className="grid grid-cols-7 gap-4">{renderDays()}</div>
                        </div>

                        {/* [5. 창 크기 조절 손잡이] */}
                        <div onMouseDown={(e) => {
                            const sX = e.clientX; const sY = e.clientY; const sW = window.innerWidth; const sH = window.innerHeight;
                            const onM = (m) => window.require('electron').ipcRenderer.send('resize-window', { width: sW+(m.clientX-sX), height: sH+(m.clientY-sY) });
                            const onU = () => { window.removeEventListener('mousemove', onM); window.removeEventListener('mouseup', onU); };
                            window.addEventListener('mousemove', onM); window.addEventListener('mouseup', onU);
                        }} className="absolute bottom-8 right-8 w-10 h-10 cursor-nwse-resize text-white/10 hover:text-blue-500 no-drag flex items-end justify-end p-1 transition-colors">◢</div>

                        {/* [6. 입력 팝업] */}
                        {addingDate && (
                            <div className="absolute inset-0 bg-black/70 flex items-center justify-center z-50 no-drag backdrop-blur-md">
                                <div className="bg-slate-900 p-10 rounded-[3.5rem] border border-white/10 w-[500px] shadow-2xl text-white">
                                    <div className="flex justify-between items-center mb-8">
                                        <h3 className="text-2xl font-black tracking-tight">{addingDate}</h3>
                                        <button onClick={() => setIsHolidayEntry(!isHolidayEntry)} className={`px-4 py-1.5 rounded-full text-[10px] font-black border transition-all ${isHolidayEntry ? 'bg-red-600 border-red-600 text-white' : 'border-white/10 text-white/20'}`}>
                                            {isHolidayEntry ? '휴일 모드 ON' : '휴일 등록'}
                                        </button>
                                    </div>
                                    
                                    <input autoFocus value={inputText} onChange={e => setInputText(e.target.value)} className="w-full bg-black/40 border border-white/10 p-5 rounded-[1.5rem] mb-6 outline-none focus:border-blue-500 text-lg" placeholder={isHolidayEntry ? "휴일 명칭 입력" : "수업 또는 업무 내용 입력"}/>
                                    
                                    {!isHolidayEntry && (
                                        <div className="space-y-6">
                                            <div className="flex gap-2">
                                                {Object.keys(TAG_COLORS).map(t => (
                                                    <button key={t} onClick={() => setSelectedTag(t)} className={`flex-1 py-3 rounded-2xl text-xs font-black transition-all ${selectedTag === t ? TAG_COLORS[t] : 'bg-white/5 text-white/20 hover:bg-white/10'}`}>{t}</button>
                                                ))}
                                            </div>
                                            <div className="bg-black/30 p-6 rounded-[2rem] border border-white/5">
                                                <label className="text-[11px] font-black text-white/20 block mb-4 uppercase tracking-widest">반복 설정</label>
                                                <div className="mb-6">
                                                    <span className="text-[10px] text-white/40 block mb-2 ml-1">언제까지 반복할까요?</span>
                                                    <input type="date" value={endDate} onChange={e => setEndDate(e.target.value)} className="bg-transparent border-b border-white/10 w-full outline-none text-sm py-2 px-1 focus:border-blue-500 transition-all"/>
                                                </div>
                                                <div className="flex justify-between px-2">
                                                    {['일','월','화','수','목','금','토'].map((d, i) => (
                                                        <label key={i} className="flex flex-col items-center gap-2 cursor-pointer group">
                                                            <span className={`text-[10px] font-bold ${repeatDays.includes(i) ? 'text-blue-400' : 'text-white/20 group-hover:text-white/40'}`}>{d}</span>
                                                            <input type="checkbox" checked={repeatDays.includes(i)} onChange={(e) => e.target.checked ? setRepeatDays([...repeatDays, i]) : setRepeatDays(repeatDays.filter(day => day !== i))} className="rounded-full border-none"/>
                                                        </label>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    <div className="flex gap-4 mt-8">
                                        <button onClick={handleSave} className="flex-[2] py-5 bg-blue-600 rounded-[1.5rem] font-black shadow-xl hover:scale-[1.02] active:scale-[0.98] transition-all">저장하기</button>
                                        <button onClick={resetForm} className="flex-1 py-5 bg-white/5 rounded-[1.5rem] text-white/40 font-black hover:bg-white/10 transition-all">취소</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
