<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교사용 바이브 캘린더</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        /* [중요] 바탕화면 아이콘이 보이도록 배경을 완전히 투명하게 설정 */
        body, html { 
            font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0; 
            background: transparent !important; 
            overflow: hidden; 
            height: 100vh; 
        }
        #root { height: 100%; background: transparent; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        
        /* 드래그 영역 설정 */
        .drag { -webkit-app-region: drag; }
        .no-drag { -webkit-app-region: no-drag !important; }

        /* 크기 조절 모드일 때 마우스로 잡기 편하도록 파란색 가이드라인 표시 */
        .resize-active { 
            border: 3px solid rgba(59, 130, 246, 0.6) !important;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp, deleteApp, getApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        window.FirebaseSDK = { initializeApp, deleteApp, getApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithPopup, GoogleAuthProvider, signOut, getFirestore, collection, doc, setDoc, onSnapshot };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        // --- 내장 아이콘 (SVG) ---
        const Icon = ({ name, size = 24, className = "" }) => {
            const paths = {
                ChevronLeft: "m15 18-6-6 6-6", ChevronRight: "m9 18 6-6-6-6", Plus: "M12 5v14M5 12h14",
                Trash2: "M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6", Palette: "M12 21a9 9 0 1 1 0-18c2.04 0 3.92.79 5.33 2.1a9.03 9.03 0 0 1 1.54 2.14",
                Settings: "M12.22 2h-.44a2 2 0 0 0-2 2l-.27 1.1a7.46 7.46 0 0 0-.87.5", Maximize: "M8 3H5a2 2 0 0 0-2 2v3m11-5h3a2 2 0 0 1 2 2v3m0 8v3a2 2 0 0 1-2 2h-3M3 16v3a2 2 0 0 0 2 2h3",
                CheckCircle2: "M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10zM9 12l2 2 4-4",
                Circle: "M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"
            };
            return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d={paths[name] || ""} /></svg>;
        };

        // --- 테마 설정 ---
        const THEMES = [
            { id: 'slate', name: '다크 슬레이트', bg: 'bg-slate-900/80', border: 'border-slate-800/50', primary: 'bg-blue-600' },
            { id: 'midnight', name: '미드나잇 블랙', bg: 'bg-zinc-950/90', border: 'border-zinc-800/50', primary: 'bg-indigo-600' },
            { id: 'ocean', name: '딥 오션', bg: 'bg-blue-950/80', border: 'border-blue-900/50', primary: 'bg-cyan-600' }
        ];

        function App() {
            const today = useMemo(() => new Date(), []);
            const [currentDate, setCurrentDate] = useState(new Date(today.getFullYear(), today.getMonth(), 1));
            const [currentThemeIdx, setCurrentThemeIdx] = useState(0);
            const [isResizable, setIsResizable] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            const [events, setEvents] = useState({});
            
            const savedConfig = localStorage.getItem('custom_firebase_config');
            const [fbConfig, setFbConfig] = useState(savedConfig ? JSON.parse(savedConfig) : null);
            const theme = THEMES[currentThemeIdx];

            // 일렉트론 환경인지 확인
            const isElectron = window.process && window.process.type === 'renderer';

            // 창 조절 모드 토글
            const toggleResizeMode = () => {
                const nextState = !isResizable;
                setIsResizable(nextState);
                if (isElectron) {
                    const { ipcRenderer } = window.require('electron');
                    ipcRenderer.send('set-resizable', nextState);
                }
            };

            const handleSaveConfig = (e) => {
                e.preventDefault();
                const fd = new FormData(e.target);
                const config = Object.fromEntries(fd.entries());
                localStorage.setItem('custom_firebase_config', JSON.stringify(config));
                setFbConfig(config);
                window.location.reload();
            };

            // --- 달력 렌더링 도우미 ---
            const renderCalendarDays = () => {
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const firstDay = new Date(year, month, 1).getDay();
                const cells = [];
                
                for (let i = 0; i < firstDay; i++) cells.push(<div key={`p-${i}`} className="h-full bg-white/5 rounded-2xl opacity-5"></div>);
                for (let d = 1; d <= daysInMonth; d++) {
                    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                    const isToday = dateStr === `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
                    cells.push(
                        <div key={d} className={`h-full min-h-[100px] p-3 border ${theme.border} bg-white/5 rounded-2xl relative group hover:bg-white/10 transition-all`}>
                            <span className={`text-sm font-black ${isToday ? 'bg-blue-600 px-2 py-0.5 rounded-full text-white' : 'text-white/60'}`}>{d}</span>
                        </div>
                    );
                }
                return cells;
            };

            return (
                <div className="h-screen w-screen p-6 flex items-center justify-center bg-transparent">
                    {/* 설정 모달 */}
                    {showSettings && (
                        <div className="fixed inset-0 z-[110] bg-black/80 backdrop-blur-md flex items-center justify-center p-4">
                            <form onSubmit={handleSaveConfig} className="max-w-md w-full bg-slate-900 p-8 rounded-[2.5rem] border border-white/10 no-drag">
                                <h2 className="text-2xl font-black mb-6 text-white tracking-tighter">Firebase 연결</h2>
                                {['apiKey', 'authDomain', 'projectId', 'storageBucket', 'messagingSenderId', 'appId'].map(k => (
                                    <input key={k} name={k} placeholder={k} defaultValue={fbConfig?.[k] || ''} className="w-full bg-black/40 border border-white/10 p-3 mb-2 rounded-2xl text-sm text-white outline-none focus:border-blue-500"/>
                                ))}
                                <button type="submit" className="w-full py-4 bg-blue-600 rounded-2xl font-black mt-4 text-white shadow-xl">설정 저장 및 새로고침</button>
                                <button type="button" onClick={()=>setShowSettings(false)} className="w-full text-white/30 text-xs mt-4">닫기</button>
                            </form>
                        </div>
                    )}

                    {/* 메인 캘린더 컨테이너 */}
                    <div className={`w-full h-full flex flex-col rounded-[3.5rem] shadow-2xl transition-all duration-500 overflow-hidden border-2 backdrop-blur-xl 
                        ${theme.bg} ${theme.border} ${isResizable ? 'resize-active' : ''}`}>
                        
                        {/* 헤더: 드래그 영역 */}
                        <div className="drag p-8 md:p-10 flex items-center justify-between bg-white/5 cursor-move">
                            <div className="no-drag flex items-center gap-6">
                                <h1 className="text-4xl font-black text-white tracking-tighter">
                                    {currentDate.getFullYear()}년 {currentDate.getMonth()+1}월
                                </h1>
                                <div className="flex gap-2">
                                    <button onClick={()=>setShowSettings(true)} className="p-3 bg-white/5 rounded-2xl text-white/40 hover:text-white transition-all shadow-lg"><Icon name="Settings" size={20}/></button>
                                    {isElectron && (
                                        <button 
                                            onClick={toggleResizeMode} 
                                            className={`p-3 px-5 rounded-2xl flex items-center gap-3 transition-all font-black text-xs shadow-lg ${isResizable ? 'bg-blue-600 text-white animate-pulse' : 'bg-white/10 text-white/40 hover:text-white'}`}
                                        >
                                            <Icon name="Maximize" size={18}/> 
                                            {isResizable ? '조절 중... (모서리 드래그)' : '크기 조절'}
                                        </button>
                                    )}
                                </div>
                            </div>

                            <div className="no-drag flex items-center gap-4">
                                {/* 테마 변경 버튼: 클릭 시 THEMES 배열 순환 */}
                                <button onClick={()=>setCurrentThemeIdx(p=>(p+1)%THEMES.length)} className="p-4 bg-white/5 rounded-3xl text-white/40 hover:text-white transition-all shadow-lg border border-white/5">
                                    <Icon name="Palette" size={26} />
                                </button>
                                <div className="flex bg-black/40 rounded-3xl p-1.5 shadow-inner border border-white/5">
                                    <button onClick={()=>setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth()-1, 1))} className="p-3 text-white/30 hover:text-white"><Icon name="ChevronLeft" size={28}/></button>
                                    <div className="w-[1px] h-6 bg-white/10 self-center"></div>
                                    <button onClick={()=>setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth()+1, 1))} className="p-3 text-white/30 hover:text-white"><Icon name="ChevronRight" size={28}/></button>
                                </div>
                            </div>
                        </div>

                        {/* 요일 헤더 */}
                        <div className="grid grid-cols-7 gap-4 px-10 py-6 bg-black/10 text-center text-[11px] font-black uppercase tracking-[0.2em] text-white/20">
                            {['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d => <div key={d}>{d}</div>)}
                        </div>

                        {/* 달력 날짜 영역: 창 크기에 따라 유동적으로 크기 조절 */}
                        <div className="flex-1 p-8 md:p-10 overflow-y-auto custom-scrollbar no-drag">
                            <div className="grid grid-cols-7 gap-4 md:gap-6 h-full">
                                {renderCalendarDays()}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
