<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>바이브 캘린더 Pro - 실무 통일판</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body, html { font-family: 'Pretendard', sans-serif; margin: 0; background: transparent !important; height: 100vh; width: 100vw; overflow: hidden; }
        @media (min-width: 768px) { .drag-area { -webkit-app-region: drag; } .no-drag { -webkit-app-region: no-drag !important; } }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input[type="checkbox"] { accent-color: #3b82f6; cursor: pointer; border-radius: 0; }
        .resize-handle { position: absolute; bottom: 0; right: 0; width: 20px; height: 20px; background: linear-gradient(135deg, transparent 50%, rgba(255,255,255,0.4) 50%); cursor: nwse-resize; z-index: 100; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, writeBatch } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        window.FirebaseSDK = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut, getFirestore, collection, doc, setDoc, onSnapshot, writeBatch };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const BASIC_HOLIDAYS = { '01-01': '신정', '03-01': '삼일절', '05-05': '어린이날', '06-06': '현충일', '08-15': '광복절', '10-03': '개천절', '10-09': '한글날', '12-25': '성탄절' };
        const TAGS = ['수업', '업무', '개인', '기타'];
        const TAG_COLORS = { '수업': 'text-blue-300', '업무': 'text-red-300', '개인': 'text-emerald-300', '기타': 'text-slate-300' };
        
        const THEMES = [
            { id: '다크', bg: 'rgba(15, 23, 42, ' },
            { id: '미드나잇', bg: 'rgba(9, 9, 11, ' },
            { id: '오션', bg: 'rgba(23, 37, 84, ' },
            { id: '포레스트', bg: 'rgba(20, 83, 45, ' },
            { id: '로즈', bg: 'rgba(131, 24, 67, ' },
            { id: '선셋', bg: 'rgba(124, 45, 18, ' }
        ];

        function App() {
            const today = new Date();
            const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
            
            const [currentDate, setCurrentDate] = useState(new Date(today.getFullYear(), today.getMonth(), 1));
            const [events, setEvents] = useState({});
            const [customHolidays, setCustomHolidays] = useState({});
            
            // [개선] 투명도와 테마를 로컬 스토리지에서 불러오기 (없으면 기본값)
            const [opacity, setOpacity] = useState(() => {
                const saved = localStorage.getItem('vibe_opacity');
                return saved !== null ? parseFloat(saved) : 0.85;
            });
            const [currentThemeIdx, setCurrentThemeIdx] = useState(() => {
                const saved = localStorage.getItem('vibe_theme_idx');
                return saved !== null ? parseInt(saved, 10) : 0;
            });

            const [addingDate, setAddingDate] = useState(null);
            const [showSettings, setShowSettings] = useState(false);
            const [showTodayPopup, setShowTodayPopup] = useState(false);
            const [filterTag, setFilterTag] = useState('전체');
            
            const [selectedMobileDate, setSelectedMobileDate] = useState(null);
            
            const [inputText, setInputText] = useState('');
            const [selectedTag, setSelectedTag] = useState('수업');
            const [endDate, setEndDate] = useState('');
            const [repeatDays, setRepeatDays] = useState([]);
            const [isHolidayMode, setIsHolidayMode] = useState(false);
            const [user, setUser] = useState(null);

            const [touchStartX, setTouchStartX] = useState(null);
            const [dragOffset, setDragOffset] = useState(0);
            const [isDragging, setIsDragging] = useState(false);
            const [transitionEnabled, setTransitionEnabled] = useState(false);

            const [rawConfig, setRawConfig] = useState(() => localStorage.getItem('custom_firebase_config_raw') || '');

            const isUpdatingRef = useRef(false);
            const isElectron = window.process && window.process.type === 'renderer';
            const fbConfig = JSON.parse(localStorage.getItem('custom_firebase_config'));
            const theme = THEMES[currentThemeIdx];

            // [개선] 투명도나 테마가 변경될 때마다 로컬 스토리지에 저장
            useEffect(() => { localStorage.setItem('vibe_opacity', opacity); }, [opacity]);
            useEffect(() => { localStorage.setItem('vibe_theme_idx', currentThemeIdx); }, [currentThemeIdx]);

            useEffect(() => {
                if (!isElectron) return;
                const { ipcRenderer } = window.require('electron');
                const handleMove = (e) => {
                    const edge = 15;
                    const isNearEdge = 
                        e.clientX < edge || e.clientX > window.innerWidth - edge || 
                        e.clientY < edge || e.clientY > window.innerHeight - edge;
                    const isInteractive = e.target.closest('.no-drag') || e.target.closest('.resize-handle') || e.target.closest('.custom-scrollbar') || isNearEdge;
                    ipcRenderer.send('set-ignore-mouse', !isInteractive);
                };
                window.addEventListener('mousemove', handleMove);
                return () => window.removeEventListener('mousemove', handleMove);
            }, [isElectron]);

            useEffect(() => {
                if (!fbConfig || !window.FirebaseSDK) return;
                const { initializeApp, getAuth, onAuthStateChanged, signInAnonymously, getFirestore, collection, onSnapshot } = window.FirebaseSDK;
                const app = initializeApp(fbConfig);
                const auth = getAuth(app);
                const db = getFirestore(app);

                return onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    if (u) {
                        onSnapshot(collection(db, 'artifacts', fbConfig.appId, 'users', u.uid, 'days'), (snap) => {
                            if (isUpdatingRef.current) return;
                            const evs = {}; const hols = {};
                            snap.forEach(doc => {
                                const data = doc.data();
                                evs[doc.id] = data.items || [];
                                if (data.holidayName) hols[doc.id] = data.holidayName;
                            });
                            setEvents(evs);
                            setCustomHolidays(hols);

                            if (evs[todayStr] && evs[todayStr].length > 0 && !showTodayPopup) {
                                setShowTodayPopup(true);
                            }
                        });
                    } else { signInAnonymously(auth).catch(()=>{}); }
                });
            }, [fbConfig]);

            const sessionMap = useMemo(() => {
                const map = {}; const counts = {};
                const sortedDates = Object.keys(events).sort();
                for (const date of sortedDates) {
                    const dayEvents = events[date] || [];
                    for (const ev of dayEvents) {
                        if (ev.tag === '수업') {
                            counts[ev.text] = (counts[ev.text] || 0) + 1;
                            map[ev.id] = counts[ev.text];
                        }
                    }
                }
                return map;
            }, [events]);

            const triggerUpdatingShield = () => {
                isUpdatingRef.current = true;
                setTimeout(() => { isUpdatingRef.current = false; }, 2000); 
            };

            const handleSave = async () => {
                if (!inputText || !user) return;
                triggerUpdatingShield(); 
                const { getFirestore, doc, writeBatch } = window.FirebaseSDK;
                const db = getFirestore();
                const batch = writeBatch(db);
                const optimisticEvents = { ...events };

                if (isHolidayMode) {
                    const ref = doc(db, 'artifacts', fbConfig.appId, 'users', user.uid, 'days', addingDate);
                    batch.set(ref, { holidayName: inputText }, { merge: true });
                } else {
                    const start = new Date(addingDate);
                    const end = endDate ? new Date(endDate) : start;
                    let curr = new Date(start);
                    while (curr <= end) {
                        const dStr = `${curr.getFullYear()}-${String(curr.getMonth()+1).padStart(2,'0')}-${String(curr.getDate()).padStart(2,'0')}`;
                        if (!endDate || repeatDays.length === 0 || repeatDays.includes(curr.getDay())) {
                            const newItem = { id: Date.now() + Math.random(), text: inputText, tag: selectedTag, completed: false };
                            optimisticEvents[dStr] = [...(optimisticEvents[dStr] || []), newItem];
                            batch.set(doc(db, 'artifacts', fbConfig.appId, 'users', user.uid, 'days', dStr), { items: optimisticEvents[dStr] }, { merge: true });
                        }
                        curr.setDate(curr.getDate() + 1);
                    }
                }
                setEvents(optimisticEvents); 
                setAddingDate(null); setInputText(''); setEndDate(''); setRepeatDays([]); setIsHolidayMode(false);
                try { await batch.commit(); } catch (e) { console.error(e); }
            };

            const handleDelete = async (dateStr, eventId) => {
                triggerUpdatingShield();
                const updatedItems = (events[dateStr] || []).filter(i => i.id !== eventId);
                setEvents(prev => ({ ...prev, [dateStr]: updatedItems }));
                const { getFirestore, doc, setDoc } = window.FirebaseSDK;
                await setDoc(doc(getFirestore(), 'artifacts', fbConfig.appId, 'users', user.uid, 'days', dateStr), { items: updatedItems }, { merge: true });
            };

            const toggleComplete = async (dateStr, id) => {
                triggerUpdatingShield();
                const updated = events[dateStr].map(ev => ev.id === id ? { ...ev, completed: !ev.completed } : ev);
                setEvents(prev => ({ ...prev, [dateStr]: updated }));
                const { getFirestore, doc, setDoc } = window.FirebaseSDK;
                await setDoc(doc(getFirestore(), 'artifacts', fbConfig.appId, 'users', user.uid, 'days', dateStr), { items: updated }, { merge: true });
            };

            const handleDragStart = (e, dateStr, item) => {
                e.dataTransfer.setData("item", JSON.stringify(item));
                e.dataTransfer.setData("fromDate", dateStr);
            };

            const handleDrop = async (e, toDateStr) => {
                const itemStr = e.dataTransfer.getData("item");
                if (!itemStr) return;
                const item = JSON.parse(itemStr);
                const fromDateStr = e.dataTransfer.getData("fromDate");
                if (fromDateStr === toDateStr) return;

                triggerUpdatingShield();
                const { getFirestore, doc, writeBatch } = window.FirebaseSDK;
                const db = getFirestore();
                const batch = writeBatch(db);
                const fromItems = (events[fromDateStr] || []).filter(i => i.id !== item.id);
                const toItems = [...(events[toDateStr] || []), item];

                setEvents(prev => ({ ...prev, [fromDateStr]: fromItems, [toDateStr]: toItems }));
                batch.set(doc(db, 'artifacts', fbConfig.appId, 'users', user.uid, 'days', fromDateStr), { items: fromItems }, { merge: true });
                batch.set(doc(db, 'artifacts', fbConfig.appId, 'users', user.uid, 'days', toDateStr), { items: toItems }, { merge: true });
                batch.commit().catch(e => console.error(e));
            };

            const handleSmartConfigSave = () => {
                try {
                    const configObj = {};
                    const keys = ['apiKey', 'authDomain', 'projectId', 'storageBucket', 'messagingSenderId', 'appId'];
                    keys.forEach(key => {
                        const regex = new RegExp(`${key}:\\s*["']([^"']+)["']`);
                        const match = rawConfig.match(regex);
                        if (match) configObj[key] = match[1];
                    });
                    if (Object.keys(configObj).length < 6) { alert("코드 누락"); return; }
                    localStorage.setItem('custom_firebase_config', JSON.stringify(configObj));
                    localStorage.setItem('custom_firebase_config_raw', rawConfig);
                    window.location.reload();
                } catch (e) { alert("파싱 오류"); }
            };

            const handleResize = (e) => {
                if (!isElectron) return;
                e.preventDefault(); e.target.setPointerCapture(e.pointerId);
                const { ipcRenderer } = window.require('electron');
                const startX = e.screenX; const startY = e.screenY;
                const startW = window.innerWidth; const startH = window.innerHeight;
                const onMove = (m) => {
                    ipcRenderer.send('window-resize', Math.max(600, startW + (m.screenX - startX)), Math.max(500, startH + (m.screenY - startY)));
                };
                const onUp = (u) => {
                    u.target.releasePointerCapture(u.pointerId);
                    window.removeEventListener('pointermove', onMove); window.removeEventListener('pointerup', onUp);
                };
                window.addEventListener('pointermove', onMove); window.addEventListener('pointerup', onUp);
            };

            const onTouchStart = (e) => { 
                setTouchStartX(e.targetTouches[0].clientX); 
                setIsDragging(true); 
                setTransitionEnabled(false);
            };
            const onTouchMove = (e) => {
                if (!isDragging || touchStartX === null) return;
                setDragOffset(e.targetTouches[0].clientX - touchStartX);
            };
            const onTouchEnd = () => {
                setIsDragging(false);
                setTransitionEnabled(true);
                const threshold = 70;
                const screenW = window.innerWidth;
                
                if (dragOffset > threshold) {
                    setDragOffset(screenW);
                    setTimeout(() => {
                        setTransitionEnabled(false);
                        setDragOffset(0);
                        setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1));
                    }, 300);
                } else if (dragOffset < -threshold) {
                    setDragOffset(-screenW);
                    setTimeout(() => {
                        setTransitionEnabled(false);
                        setDragOffset(0);
                        setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1));
                    }, 300);
                } else {
                    setDragOffset(0);
                }
                setTouchStartX(null);
            };

            const renderMonth = (targetDate) => {
                const year = targetDate.getFullYear(); const month = targetDate.getMonth();
                const days = [];
                const firstDay = new Date(year, month, 1).getDay();
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const prevMonthLastDate = new Date(year, month, 0).getDate();
                const totalSlots = Math.ceil((firstDay + daysInMonth) / 7) * 7;

                for (let i = 0; i < firstDay; i++) {
                    const prevD = prevMonthLastDate - firstDay + i + 1;
                    days.push(<div key={`p-${year}-${month}-${i}`} className="min-h-[100px] border-r border-b border-white/10 bg-white/5 opacity-40 flex flex-col px-1.5 py-1"><span className="text-[11px] font-bold text-white/30">{prevD}</span></div>);
                }

                for (let d = 1; d <= daysInMonth; d++) {
                    const dStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                    const dow = new Date(year, month, d).getDay();
                    const basicHol = BASIC_HOLIDAYS[`${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`];
                    const customHol = customHolidays[dStr];
                    const isToday = dStr === todayStr;
                    const isRed = dow === 0 || basicHol || customHol;

                    const dayEvs = (events[dStr] || [])
                        .filter(e => filterTag === '전체' || e.tag === filterTag)
                        .sort((a, b) => a.completed - b.completed);

                    days.push(
                        <div key={dStr} onDragOver={e => e.preventDefault()} onDrop={e => handleDrop(e, dStr)}
                            onClick={() => window.innerWidth < 768 && setSelectedMobileDate(dStr)} 
                            className={`min-h-[100px] border-r border-b border-white/10 relative group hover:bg-white/10 transition-colors flex flex-col no-drag overflow-hidden cursor-pointer md:cursor-default
                            ${dow === 0 ? 'bg-red-950/20' : dow === 6 ? 'bg-blue-950/20' : 'bg-slate-900/40'}`}>
                            
                            <div className="flex justify-between items-start px-1.5 py-1 w-full min-w-0">
                                <div className="flex items-center gap-1 min-w-0 flex-1">
                                    <span className={`text-[11px] font-bold shrink-0 ${isToday ? 'bg-blue-600 text-white px-1 shadow' : isRed ? 'text-red-400' : dow === 6 ? 'text-blue-400' : 'text-white/80'}`}>{d}</span>
                                    {(basicHol || customHol) && <span className="text-[9px] text-red-500 font-bold truncate leading-none pt-[1px]">{basicHol || customHol}</span>}
                                </div>
                                <button onClick={(e) => { e.stopPropagation(); setAddingDate(dStr); }} className="hidden md:block opacity-0 group-hover:opacity-100 text-white/40 hover:text-white shrink-0 text-sm leading-none ml-1">+</button>
                            </div>

                            <div className="space-y-[2px] flex-1 overflow-y-auto custom-scrollbar pointer-events-none md:pointer-events-auto px-1 pb-1">
                                {dayEvs.map(ev => (
                                    <div key={ev.id} draggable onDragStart={(e) => handleDragStart(e, dStr, ev)} 
                                        className={`text-[11px] leading-tight flex items-start gap-1 cursor-grab group/ev hover:bg-white/10 px-0.5 py-0.5 ${ev.completed ? 'opacity-40 line-through text-white/50' : 'text-white/90'}`}>
                                        <span className={`shrink-0 font-black ${TAG_COLORS[ev.tag]}`}>•</span>
                                        <span className="truncate flex-1 cursor-pointer" onClick={(e) => { e.stopPropagation(); toggleComplete(dStr, ev.id); }}>
                                            {ev.text} {ev.tag === '수업' ? <span className="opacity-60 ml-0.5">({sessionMap[ev.id] || ''}차시)</span> : ''}
                                        </span>
                                        <button onClick={(e) => { e.stopPropagation(); handleDelete(dStr, ev.id); }} className="hidden md:block opacity-0 group-hover/ev:opacity-100 no-drag text-red-400 hover:text-red-300 shrink-0 leading-none">×</button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    );
                }

                const remainingSlots = totalSlots - (firstDay + daysInMonth);
                for (let i = 1; i <= remainingSlots; i++) {
                    days.push(<div key={`n-${year}-${month}-${i}`} className="min-h-[100px] border-r border-b border-white/10 bg-white/5 opacity-40 flex flex-col px-1.5 py-1"><span className="text-[11px] font-bold text-white/30">{i}</span></div>);
                }
                return days;
            };

            const prevMonthDate = new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1);
            const nextMonthDate = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1);

            return (
                <div style={{ backgroundColor: `${theme.bg}${opacity})` }} className="h-screen w-screen flex flex-col relative overflow-hidden border border-white/20">
                    
                    {!fbConfig && (
                        <div className="fixed inset-0 z-[300] bg-slate-950 flex flex-col items-center justify-center p-6 text-center">
                            <h2 className="text-2xl font-black text-white mb-6 tracking-tighter">바이브 캘린더 PRO</h2>
                            <button onClick={()=>setShowSettings(true)} className="px-6 py-3 bg-blue-600 font-black text-white shadow-lg">연결 설정 시작하기</button>
                        </div>
                    )}

                    <div className="drag-area min-h-[40px] bg-black/60 border-b border-white/20 flex flex-wrap md:flex-nowrap justify-between items-center px-4 py-2 shrink-0 gap-2">
                        <div className="flex flex-wrap items-center gap-2 md:gap-3 w-full md:w-auto justify-between md:justify-start no-drag">
                            <span className="text-sm font-bold text-white shrink-0">{currentDate.getFullYear()}년 {currentDate.getMonth()+1}월</span>
                            
                            <div className="flex bg-white/5 p-0.5 gap-0.5 rounded shrink-0">
                                {['전체', ...TAGS].map(t => (
                                    <button key={t} onClick={() => setFilterTag(t)} className={`px-2 py-0.5 text-[10px] font-bold rounded transition-all ${filterTag === t ? 'bg-white/20 text-white' : 'text-white/30 hover:text-white/60'}`}>{t}</button>
                                ))}
                            </div>
                        </div>
                        
                        <div className="flex items-center gap-3 w-full md:w-auto justify-end no-drag text-white shrink-0">
                            <div className="hidden md:flex items-center gap-2">
                                <input type="range" min="0.1" max="1" step="0.05" value={opacity} onChange={e => setOpacity(e.target.value)} className="w-16 h-1 bg-white/20 cursor-pointer"/>
                                <button onClick={() => setCurrentThemeIdx(p => (p+1)%THEMES.length)} className="text-[11px] font-bold opacity-60 hover:opacity-100">🎨 {theme.id}</button>
                            </div>
                            <div className="flex items-center bg-white/10 rounded text-[11px] overflow-hidden shrink-0">
                                <button onClick={() => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth()-1, 1))} className="px-3 py-1 hover:bg-white/20 transition-colors">◀</button>
                                <button onClick={() => setCurrentDate(new Date(today.getFullYear(), today.getMonth(), 1))} className="px-3 py-1 font-bold text-blue-300 hover:bg-white/20 transition-colors border-x border-white/10">오늘</button>
                                <button onClick={() => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth()+1, 1))} className="px-3 py-1 hover:bg-white/20 transition-colors">▶</button>
                            </div>
                            <button onClick={() => setShowSettings(true)} className="text-lg opacity-60 hover:opacity-100 p-1 shrink-0">⚙️</button>
                        </div>
                    </div>

                    <div className="grid grid-cols-7 border-b border-white/20 bg-black/40 shrink-0 no-drag z-10 relative">
                        {['일','월','화','수','목','금','토'].map((d, i) => (<div key={d} className={`text-center py-1 text-[11px] font-bold border-r border-white/10 ${i===0 ? 'text-red-400' : i===6 ? 'text-blue-400' : 'text-white/60'}`}>{d}</div>))}
                    </div>

                    <div className="flex-1 overflow-x-hidden overflow-y-hidden relative no-drag">
                        <div 
                            onTouchStart={onTouchStart}
                            onTouchMove={onTouchMove}
                            onTouchEnd={onTouchEnd}
                            className="flex h-full w-[300%] ml-[-100%]"
                            style={{
                                transform: `translateX(${dragOffset}px)`,
                                transition: transitionEnabled ? 'transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1)' : 'none',
                                touchAction: 'pan-y'
                            }}
                        >
                            <div className="w-1/3 h-full overflow-y-auto custom-scrollbar pb-12 md:pb-0">
                                <div className="grid grid-cols-7 auto-rows-[minmax(100px,1fr)] min-h-full">
                                    {renderMonth(prevMonthDate)}
                                </div>
                            </div>
                            <div className="w-1/3 h-full overflow-y-auto custom-scrollbar pb-12 md:pb-0">
                                <div className="grid grid-cols-7 auto-rows-[minmax(100px,1fr)] min-h-full">
                                    {renderMonth(currentDate)}
                                </div>
                            </div>
                            <div className="w-1/3 h-full overflow-y-auto custom-scrollbar pb-12 md:pb-0">
                                <div className="grid grid-cols-7 auto-rows-[minmax(100px,1fr)] min-h-full">
                                    {renderMonth(nextMonthDate)}
                                </div>
                            </div>
                        </div>
                    </div>

                    <button onClick={() => setAddingDate(todayStr)} className="md:hidden fixed bottom-6 right-6 w-14 h-14 bg-blue-600 shadow-[0_0_20px_rgba(37,99,235,0.5)] z-40 flex items-center justify-center text-white text-3xl font-light active:scale-95 transition-transform no-drag">
                        +
                    </button>

                    <div className="resize-handle no-drag" onPointerDown={handleResize}></div>

                    {selectedMobileDate && (
                        <div className="md:hidden fixed inset-0 z-50 bg-black/60 flex flex-col justify-end no-drag backdrop-blur-sm" onClick={() => setSelectedMobileDate(null)}>
                            <div className="bg-slate-900 w-full p-6 pb-12 shadow-[0_-10px_40px_rgba(0,0,0,0.5)] border-t border-white/10" onClick={e => e.stopPropagation()}>
                                <div className="w-10 h-1.5 bg-white/20 mx-auto mb-6"></div>
                                <h3 className="text-xl font-black text-white mb-6">{selectedMobileDate} 일정</h3>
                                <div className="space-y-3 mb-8 max-h-[40vh] overflow-y-auto custom-scrollbar pr-2">
                                    {(events[selectedMobileDate] || []).length === 0 ? (
                                        <p className="text-white/30 text-center py-4 text-sm font-bold bg-white/5">등록된 일정이 없습니다.</p>
                                    ) : (
                                        (events[selectedMobileDate] || []).map(ev => (
                                            <div key={ev.id} className={`p-3 border border-white/10 ${TAG_COLORS[ev.tag]} flex items-center gap-3 ${ev.completed ? 'opacity-40' : ''}`}>
                                                <input type="checkbox" checked={ev.completed} onChange={() => toggleComplete(selectedMobileDate, ev.id)} className="w-5 h-5 accent-blue-500"/>
                                                <span className={`flex-1 text-sm font-bold ${ev.completed ? 'line-through' : ''}`}>
                                                    {ev.text} {ev.tag === '수업' ? `(${sessionMap[ev.id] || ''}차시)` : ''}
                                                </span>
                                                <button onClick={() => handleDelete(selectedMobileDate, ev.id)} className="text-white/60 hover:text-red-400 font-black px-2 py-1 text-lg">×</button>
                                            </div>
                                        ))
                                    )}
                                </div>
                                <button onClick={() => { setAddingDate(selectedMobileDate); setSelectedMobileDate(null); }} className="w-full py-4 bg-blue-600 text-white font-black shadow-lg">+ 이 날짜에 새 일정 추가</button>
                            </div>
                        </div>
                    )}

                    {showTodayPopup && (
                        <div className="fixed top-12 right-4 z-[200] w-64 bg-slate-900/95 border border-blue-500/50 shadow-2xl p-4 backdrop-blur-md no-drag">
                            <div className="flex justify-between items-center mb-3">
                                <h3 className="text-xs font-black text-blue-400">📅 오늘의 주요 일정</h3>
                                <button onClick={() => setShowTodayPopup(false)} className="text-xs text-white/30 hover:text-white">닫기</button>
                            </div>
                            <div className="space-y-2 max-h-48 overflow-y-auto custom-scrollbar">
                                {(events[todayStr] || []).map(ev => (
                                    <div key={ev.id} className="text-[11px] text-white/90 border-l-2 border-blue-500 pl-2 py-0.5">
                                        {ev.text} {ev.tag === '수업' ? `(${sessionMap[ev.id] || ''}차시)` : ''}
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {addingDate && (
                        <div className="absolute inset-0 bg-black/80 flex items-center justify-center z-50 no-drag p-4 backdrop-blur-md">
                            <div className="bg-slate-900 p-8 border border-white/20 w-full max-w-md shadow-2xl text-white">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="text-xl font-bold text-blue-400">{addingDate}</h3>
                                    <button onClick={() => setIsHolidayMode(!isHolidayMode)} className={`px-3 py-1.5 text-[11px] font-bold border ${isHolidayMode ? 'bg-red-900/50 border-red-500/50 text-red-200' : 'border-white/20 text-white/50 hover:text-white'}`}>
                                        {isHolidayMode ? '휴일 모드 활성' : '휴일 등록'}
                                    </button>
                                </div>
                                
                                <input autoFocus value={inputText} onChange={e => setInputText(e.target.value)} className="w-full bg-black/50 border border-white/20 p-3 mb-6 outline-none focus:border-blue-500 text-sm" placeholder={isHolidayMode ? "휴일 명칭" : "내용 입력"}/>
                                
                                {!isHolidayMode && (
                                    <div className="space-y-6">
                                        <div className="flex gap-2">
                                            {TAGS.map(t => (<button key={t} onClick={() => setSelectedTag(t)} className={`flex-1 py-2 text-[11px] font-bold border ${selectedTag === t ? 'bg-white/10 border-white/40 text-white' : 'border-transparent bg-white/5 text-white/40'}`}>{t}</button>))}
                                        </div>
                                        <div className="bg-black/30 p-4 border border-white/10">
                                            <div className="flex justify-between items-center mb-4"><span className="text-[11px] font-bold text-white/50">반복 종료일</span><input type="date" value={endDate} onChange={e => setEndDate(e.target.value)} className="bg-transparent outline-none text-xs font-bold text-white/80"/></div>
                                            <div className="flex justify-between px-1">{['일','월','화','수','목','금','토'].map((d, i) => (<label key={i} className="flex flex-col items-center gap-2 cursor-pointer"><span className={`text-[10px] font-bold ${repeatDays.includes(i) ? 'text-blue-400' : 'text-white/40'}`}>{d}</span><input type="checkbox" checked={repeatDays.includes(i)} onChange={(e) => e.target.checked ? setRepeatDays([...repeatDays, i]) : setRepeatDays(repeatDays.filter(day => day !== i))} className="w-4 h-4 shadow-inner accent-blue-500"/></label>))}</div>
                                        </div>
                                    </div>
                                )}
                                <div className="flex gap-3 mt-8">
                                    <button onClick={handleSave} className="flex-[2] py-3 bg-blue-600 font-bold text-white hover:bg-blue-500 text-sm">저장</button>
                                    <button onClick={() => setAddingDate(null)} className="flex-1 py-3 bg-white/10 text-white/60 font-bold hover:bg-white/20 text-sm">취소</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showSettings && (
                        <div className="fixed inset-0 z-[310] bg-black/90 flex items-center justify-center p-6 no-drag backdrop-blur-md">
                            <div className="bg-slate-900 p-8 border border-white/20 w-full max-w-lg shadow-2xl text-white">
                                <h2 className="text-xl font-bold mb-4">데이터 연결 확인 및 설정</h2>
                                <textarea 
                                    value={rawConfig}
                                    onChange={(e) => setRawConfig(e.target.value)}
                                    placeholder="firebaseConfig 코드를 붙여넣으세요"
                                    className="w-full h-40 bg-black/50 border border-white/20 p-3 text-blue-200 text-xs font-mono mb-6 outline-none focus:border-blue-500 custom-scrollbar"
                                />
                                <div className="flex gap-3">
                                    <button onClick={handleSmartConfigSave} className="flex-[2] py-3 bg-blue-600 text-white font-bold text-sm">연결 업데이트</button>
                                    {fbConfig && <button onClick={() => setShowSettings(false)} className="flex-1 py-3 bg-white/10 text-white/60 font-bold text-sm">닫기</button>}
                                </div>
                                <div className="mt-8 pt-6 border-t border-white/10 flex items-center justify-between text-xs font-bold">
                                    <span className="text-white/50">{user ? `계정: ${user.email || '익명 접속'}` : '로그인 안됨'}</span>
                                    {user ? (<button type="button" onClick={async () => { await window.FirebaseSDK.signOut(window.FirebaseSDK.getAuth()); window.location.reload(); }} className="text-red-400 border border-white/10 px-2 py-1">로그아웃</button>) 
                                          : (<button type="button" onClick={async () => { const { getAuth, signInWithPopup, GoogleAuthProvider } = window.FirebaseSDK; await signInWithPopup(getAuth(), new GoogleAuthProvider()); }} className="text-blue-400 border border-white/10 px-2 py-1">구글 로그인</button>)}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
