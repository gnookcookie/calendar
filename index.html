<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>바이브 캘린더 Pro - 렌더링 최적화</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body, html { font-family: 'Pretendard', sans-serif; margin: 0; background: transparent !important; height: 100vh; width: 100vw; overflow: hidden; }
        @media (min-width: 768px) { .drag-area { -webkit-app-region: drag; } .no-drag { -webkit-app-region: no-drag !important; } }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input[type="checkbox"] { accent-color: #3b82f6; cursor: pointer; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, writeBatch } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        window.FirebaseSDK = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut, getFirestore, collection, doc, setDoc, onSnapshot, writeBatch };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const BASIC_HOLIDAYS = { '01-01': '신정', '03-01': '삼일절', '05-05': '어린이날', '06-06': '현충일', '08-15': '광복절', '10-03': '개천절', '10-09': '한글날', '12-25': '성탄절' };
        const TAGS = ['수업', '업무', '개인', '기타'];
        const TAG_COLORS = { '수업': 'bg-blue-500/30 text-blue-100 border-blue-500/40', '업무': 'bg-red-500/30 text-red-100 border-red-500/40', '개인': 'bg-emerald-500/30 text-emerald-100 border-emerald-500/40', '기타': 'bg-slate-500/30 text-slate-100 border-slate-500/40' };
        const THEMES = [{ id: '다크', bg: 'rgba(15, 23, 42, ' }, { id: '미드나잇', bg: 'rgba(9, 9, 11, ' }, { id: '오션', bg: 'rgba(23, 37, 84, ' }];

        function App() {
            const today = new Date();
            const [currentDate, setCurrentDate] = useState(new Date(today.getFullYear(), today.getMonth(), 1));
            const [events, setEvents] = useState({});
            const [customHolidays, setCustomHolidays] = useState({});
            const [opacity, setOpacity] = useState(0.85);
            const [currentThemeIdx, setCurrentThemeIdx] = useState(0);
            const [addingDate, setAddingDate] = useState(null);
            const [showSettings, setShowSettings] = useState(false);
            const [filterTag, setFilterTag] = useState('전체');
            
            const [inputText, setInputText] = useState('');
            const [selectedTag, setSelectedTag] = useState('수업');
            const [endDate, setEndDate] = useState('');
            const [repeatDays, setRepeatDays] = useState([]);
            const [isHolidayMode, setIsHolidayMode] = useState(false);
            const [user, setUser] = useState(null);

            const calendarRef = useRef(null);
            const isElectron = window.process && window.process.type === 'renderer';
            const fbConfig = JSON.parse(localStorage.getItem('custom_firebase_config'));
            const theme = THEMES[currentThemeIdx];
            const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

            useEffect(() => {
                if (!isElectron) return;
                const { ipcRenderer } = window.require('electron');
                const handleMove = (e) => {
                    if (!calendarRef.current) return;
                    const r = calendarRef.current.getBoundingClientRect();
                    ipcRenderer.send('set-ignore-mouse', !(e.clientX >= r.left && e.clientX <= r.right && e.clientY >= r.top && e.clientY <= r.bottom));
                };
                window.addEventListener('mousemove', handleMove);
                return () => window.removeEventListener('mousemove', handleMove);
            }, []);

            useEffect(() => {
                if (!fbConfig || !window.FirebaseSDK) return;
                const { initializeApp, getAuth, onAuthStateChanged, signInAnonymously, getFirestore, collection, onSnapshot } = window.FirebaseSDK;
                const app = initializeApp(fbConfig);
                const auth = getAuth(app);
                const db = getFirestore(app);

                return onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    if (u) {
                        onSnapshot(collection(db, 'artifacts', fbConfig.appId, 'users', u.uid, 'days'), (snap) => {
                            const evs = {}; const hols = {};
                            snap.forEach(doc => {
                                const data = doc.data();
                                evs[doc.id] = data.items || [];
                                if (data.holidayName) hols[doc.id] = data.holidayName;
                            });
                            setEvents(evs); setCustomHolidays(hols);
                        });
                    } else { signInAnonymously(auth).catch(()=>{}); }
                });
            }, [fbConfig]);

            const sessionMap = useMemo(() => {
                const map = {};
                const counts = {};
                const sortedDates = Object.keys(events).sort();
                for (const date of sortedDates) {
                    const dayEvents = events[date] || [];
                    for (const ev of dayEvents) {
                        if (ev.tag === '수업') {
                            counts[ev.text] = (counts[ev.text] || 0) + 1;
                            map[ev.id] = counts[ev.text];
                        }
                    }
                }
                return map;
            }, [events]);

            const saveToDB = async (dateStr, data) => {
                if (!user) return;
                const { getFirestore, doc, setDoc } = window.FirebaseSDK;
                await setDoc(doc(getFirestore(), 'artifacts', fbConfig.appId, 'users', user.uid, 'days', dateStr), data, { merge: true });
            };

            const handleSave = async () => {
                if (!inputText || !user) return;
                
                const { getFirestore, doc, writeBatch } = window.FirebaseSDK;
                const db = getFirestore();
                const batch = writeBatch(db);

                const optimisticEvents = { ...events };

                if (isHolidayMode) {
                    const ref = doc(db, 'artifacts', fbConfig.appId, 'users', user.uid, 'days', addingDate);
                    batch.set(ref, { holidayName: inputText }, { merge: true });
                } else {
                    const start = new Date(addingDate);
                    const end = endDate ? new Date(endDate) : start;
                    let curr = new Date(start);
                    
                    while (curr <= end) {
                        const dStr = `${curr.getFullYear()}-${String(curr.getMonth()+1).padStart(2,'0')}-${String(curr.getDate()).padStart(2,'0')}`;
                        const isEveryday = repeatDays.length === 0;
                        const isMatchingDay = repeatDays.includes(curr.getDay());

                        if (!endDate || isEveryday || isMatchingDay) {
                            const newItem = { id: Date.now() + Math.random(), text: inputText, tag: selectedTag, completed: false };
                            const currentItems = optimisticEvents[dStr] || [];
                            const newItems = [...currentItems, newItem];
                            
                            optimisticEvents[dStr] = newItems;
                            
                            const ref = doc(db, 'artifacts', fbConfig.appId, 'users', user.uid, 'days', dStr);
                            batch.set(ref, { items: newItems }, { merge: true });
                        }
                        curr.setDate(curr.getDate() + 1);
                    }
                }
                
                setEvents(optimisticEvents); 
                setAddingDate(null); setInputText(''); setEndDate(''); setRepeatDays([]); setIsHolidayMode(false);

                try { await batch.commit(); } catch (error) { console.error("저장 실패:", error); }
            };

            // [수정 완료] 삭제 시 화면 즉시 반영 및 멈춤 해결
            const handleDelete = (dateStr, eventId) => {
                // 1. 화면에서 먼저 지웁니다 (0.01초 반응)
                const updatedItems = (events[dateStr] || []).filter(i => i.id !== eventId);
                setEvents(prev => ({ ...prev, [dateStr]: updatedItems }));
                
                // 2. 서버에는 뒤에서 조용히 저장합니다 (기다리지 않음)
                saveToDB(dateStr, { items: updatedItems }).catch(e => console.error("삭제 실패", e));
            };

            // [수정 완료] 체크 완료 시 화면 즉시 반영 및 멈춤 해결
            const toggleComplete = (dateStr, eventId) => {
                // 1. 화면에 먼저 줄을 긋습니다 (0.01초 반응)
                const updatedItems = (events[dateStr] || []).map(item => item.id === eventId ? { ...item, completed: !item.completed } : item);
                setEvents(prev => ({ ...prev, [dateStr]: updatedItems }));
                
                // 2. 서버에는 뒤에서 조용히 저장합니다 (기다리지 않음)
                saveToDB(dateStr, { items: updatedItems }).catch(e => console.error("토글 실패", e));
            };

            const handleDragStart = (e, dateStr, item) => {
                e.dataTransfer.setData("item", JSON.stringify(item));
                e.dataTransfer.setData("fromDate", dateStr);
            };

            const handleDrop = async (e, toDateStr) => {
                const itemStr = e.dataTransfer.getData("item");
                if (!itemStr) return;
                const item = JSON.parse(itemStr);
                const fromDateStr = e.dataTransfer.getData("fromDate");
                if (fromDateStr === toDateStr) return;

                const { getFirestore, doc, writeBatch } = window.FirebaseSDK;
                const db = getFirestore();
                const batch = writeBatch(db);

                const fromItems = (events[fromDateStr] || []).filter(i => i.id !== item.id);
                const toItems = [...(events[toDateStr] || []), item];

                // 화면 즉시 반영
                setEvents(prev => ({ ...prev, [fromDateStr]: fromItems, [toDateStr]: toItems }));

                batch.set(doc(db, 'artifacts', fbConfig.appId, 'users', user.uid, 'days', fromDateStr), { items: fromItems }, { merge: true });
                batch.set(doc(db, 'artifacts', fbConfig.appId, 'users', user.uid, 'days', toDateStr), { items: toItems }, { merge: true });
                batch.commit().catch(e => console.error("이동 실패", e));
            };

            const renderDays = () => {
                const year = currentDate.getFullYear(); const month = currentDate.getMonth();
                const days = [];
                const firstDay = new Date(year, month, 1).getDay();
                const daysInMonth = new Date(year, month + 1, 0).getDate();

                for (let i = 0; i < firstDay; i++) days.push(<div key={`p-${i}`} className="opacity-5 bg-white/10 rounded-xl md:rounded-3xl"></div>);
                for (let d = 1; d <= daysInMonth; d++) {
                    const dStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                    const dow = new Date(year, month, d).getDay();
                    const basicHol = BASIC_HOLIDAYS[`${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`];
                    const customHol = customHolidays[dStr];
                    
                    const isToday = dStr === todayStr;
                    const isRed = dow === 0 || basicHol || customHol;

                    const dayEvs = (events[dStr] || [])
                        .filter(e => filterTag === '전체' || e.tag === filterTag)
                        .sort((a, b) => a.completed - b.completed);

                    days.push(
                        <div key={d} onDragOver={(e) => e.preventDefault()} onDrop={(e) => handleDrop(e, dStr)} className="min-h-[80px] md:min-h-[125px] p-1.5 md:p-3 bg-white/5 border border-white/5 rounded-xl md:rounded-3xl relative group hover:bg-white/10 transition-all flex flex-col no-drag">
                            <div className="flex justify-between items-start mb-1">
                                <div className="flex flex-col">
                                    <span className={`text-[10px] md:text-xs font-black inline-flex items-center justify-center ${isToday ? 'bg-blue-600 text-white px-2 py-0.5 rounded-lg shadow-md' : isRed ? 'text-red-400' : dow === 6 ? 'text-blue-400' : 'text-white/40'}`}>
                                        {d}
                                    </span>
                                    {(basicHol || customHol) && <span className="text-[8px] md:text-[9px] text-red-500 font-bold leading-tight mt-1 max-w-[40px] md:max-w-none truncate">{basicHol || customHol}</span>}
                                </div>
                                <button onClick={() => setAddingDate(dStr)} className="opacity-100 md:opacity-0 group-hover:opacity-100 text-white/60 md:text-white/40 hover:text-white">+</button>
                            </div>
                            <div className="space-y-1 flex-1 overflow-y-auto no-scrollbar">
                                {dayEvs.map(ev => (
                                    <div key={ev.id} draggable onDragStart={(e) => handleDragStart(e, dStr, ev)} className={`text-[8px] md:text-[9px] p-1 md:p-1.5 rounded border ${TAG_COLORS[ev.tag]} flex items-center gap-1 group/ev cursor-grab active:cursor-grabbing ${ev.completed ? 'opacity-40 grayscale' : ''}`}>
                                        {/* 체크박스 즉시 반영 토글 적용 */}
                                        <input type="checkbox" checked={ev.completed} onChange={() => toggleComplete(dStr, ev.id)} className="w-2 h-2 md:w-3 md:h-3 no-drag"/>
                                        <span className={`truncate flex-1 ${ev.completed ? 'line-through' : ''}`}>
                                            {ev.text} {ev.tag === '수업' ? `(${sessionMap[ev.id] || ''}차시)` : ''}
                                        </span>
                                        {/* 삭제 버튼 즉시 반영 삭제 적용 */}
                                        <button onClick={() => handleDelete(dStr, ev.id)} className="ml-1 opacity-100 md:opacity-0 group-hover/ev:opacity-100 no-drag p-1">×</button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    );
                }
                return days;
            };

            return (
                <div className="h-screen w-screen flex items-center justify-center bg-black md:bg-transparent">
                    {!fbConfig && (
                        <div className="fixed inset-0 z-[300] bg-slate-950 flex flex-col items-center justify-center p-6 text-center">
                            <h2 className="text-2xl md:text-3xl font-black text-white mb-6">바이브 캘린더 PRO</h2>
                            <button onClick={()=>setShowSettings(true)} className="px-8 py-4 bg-blue-600 rounded-2xl font-black text-lg text-white shadow-2xl">연결 설정 시작하기</button>
                        </div>
                    )}

                    <div style={{ backgroundColor: `${theme.bg}${opacity})` }} className="w-full h-full md:w-[98%] md:h-[98%] flex flex-col md:rounded-[3rem] shadow-none md:shadow-2xl border-none md:border border-white/10 md:backdrop-blur-3xl relative overflow-hidden">
                        
                        <div className="drag-area p-4 md:p-8 flex flex-col gap-4 bg-white/5 cursor-move">
                            <div className="flex flex-col md:flex-row md:items-center justify-between no-drag gap-4">
                                <div className="flex items-center justify-between md:justify-start w-full md:w-auto gap-4 text-white">
                                    <h1 className="text-2xl md:text-4xl font-black tracking-tighter italic">{currentDate.getFullYear()}년 {currentDate.getMonth()+1}월</h1>
                                    <div className="hidden md:flex items-center gap-4 bg-black/40 px-4 py-2 rounded-2xl border border-white/5">
                                        <button onClick={() => setCurrentThemeIdx(p => (p+1)%THEMES.length)} className="text-[10px] font-black opacity-40 hover:opacity-100">🎨 {theme.id}</button>
                                        <div className="w-[1px] h-4 bg-white/10"></div>
                                        <input type="range" min="0.1" max="1" step="0.05" value={opacity} onChange={e => setOpacity(e.target.value)} className="w-20 h-1 appearance-none bg-white/10 rounded-full accent-blue-600"/>
                                        <button onClick={() => setShowSettings(true)} className="text-[10px] font-black opacity-40 hover:opacity-100 ml-2">⚙️ 설정</button>
                                    </div>
                                    <button onClick={() => setShowSettings(true)} className="md:hidden text-lg">⚙️</button>
                                </div>
                                
                                <div className="flex items-center justify-between md:justify-end w-full md:w-auto gap-3">
                                    {user && !user.isAnonymous ? (
                                        <div className="flex items-center gap-2 md:gap-3 bg-white/5 p-1.5 pr-4 md:pr-6 rounded-full border border-white/10">
                                            <img src={user.photoURL} className="w-8 h-8 md:w-10 md:h-10 rounded-full border border-blue-500/30"/>
                                            <div className="flex flex-col">
                                                <span className="text-[10px] md:text-xs font-black text-white/80 truncate max-w-[80px]">{user.displayName}</span>
                                                <button onClick={async () => { await window.FirebaseSDK.signOut(window.FirebaseSDK.getAuth()); window.location.reload(); }} className="text-[8px] md:text-[9px] font-black text-red-400 text-left">로그아웃</button>
                                            </div>
                                        </div>
                                    ) : (
                                        <button onClick={async () => { const { getAuth, signInWithPopup, GoogleAuthProvider } = window.FirebaseSDK; await signInWithPopup(getAuth(), new GoogleAuthProvider()); }} className="px-4 py-2 md:px-6 bg-blue-600 rounded-xl font-bold text-xs text-white">로그인</button>
                                    )}
                                    <div className="flex bg-black/50 rounded-xl md:rounded-2xl p-1 shadow-inner border border-white/5">
                                        <button onClick={() => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth()-1, 1))} className="px-3 py-2 text-white/40 hover:text-white">◀</button>
                                        <button onClick={() => setCurrentDate(new Date(today.getFullYear(), today.getMonth(), 1))} className="px-3 py-2 text-blue-400 font-bold hover:text-blue-300">오늘</button>
                                        <button onClick={() => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth()+1, 1))} className="px-3 py-2 text-white/40 hover:text-white">▶</button>
                                    </div>
                                </div>
                            </div>
                            
                            <div className="no-drag flex items-center gap-2 border-t border-white/5 pt-3 overflow-x-auto no-scrollbar whitespace-nowrap">
                                <span className="text-[9px] md:text-[10px] font-black text-white/30 mr-2 shrink-0">필터:</span>
                                {['전체', ...TAGS].map(tag => (
                                    <button key={tag} onClick={() => setFilterTag(tag)} className={`shrink-0 px-3 py-1.5 md:px-4 md:py-1.5 rounded-lg md:rounded-xl text-[10px] md:text-[11px] font-black transition-all border ${filterTag === tag ? 'bg-white/20 text-white border-white/20 shadow-lg' : 'bg-black/20 text-white/30 border-transparent hover:text-white/60'}`}>{tag}</button>
                                ))}
                            </div>
                        </div>

                        <div className="grid grid-cols-7 gap-1.5 md:gap-3 px-2 md:px-10 py-3 md:py-4 text-center text-[8px] md:text-[10px] font-black uppercase text-white/20">
                            {['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d => <div key={d}>{d}</div>)}
                        </div>

                        <div className="flex-1 p-2 md:p-10 pt-0 overflow-y-auto custom-scrollbar no-drag pb-10 md:pb-10">
                            <div className="grid grid-cols-7 gap-1.5 md:gap-3">{renderDays()}</div>
                        </div>

                        {isElectron && (
                            <div onMouseDown={(e) => {
                                const sX = e.clientX; const sY = e.clientY; const sW = window.innerWidth; const sH = window.innerHeight;
                                const onM = (m) => window.require('electron').ipcRenderer.send('resize-window', { width: sW+(m.clientX-sX), height: sH+(m.clientY-sY) });
                                const onU = () => { window.removeEventListener('mousemove', onM); window.removeEventListener('mouseup', onU); };
                                window.addEventListener('mousemove', onM); window.addEventListener('mouseup', onU);
                            }} className="hidden md:flex absolute bottom-6 right-6 w-10 h-10 cursor-nwse-resize text-white/10 hover:text-blue-500 items-end justify-end p-2 transition-all no-drag">◢</div>
                        )}

                        {addingDate && (
                            <div className="absolute inset-0 bg-black/85 flex items-center justify-center z-50 no-drag p-4 backdrop-blur-xl">
                                <div className="bg-slate-900 p-6 md:p-10 rounded-[2rem] md:rounded-[3rem] border border-white/10 w-full max-w-lg shadow-2xl text-white max-h-[90vh] overflow-y-auto custom-scrollbar">
                                    <div className="flex justify-between items-center mb-6">
                                        <h3 className="text-xl md:text-2xl font-black italic">{addingDate}</h3>
                                        <button onClick={() => setIsHolidayMode(!isHolidayMode)} className={`px-3 py-1.5 rounded-full text-[9px] md:text-[10px] font-black border transition-all ${isHolidayMode ? 'bg-red-600 border-red-600' : 'border-white/10 text-white/20'}`}>{isHolidayMode ? '휴일 모드 ON' : '휴일 등록'}</button>
                                    </div>
                                    <input autoFocus value={inputText} onChange={e => setInputText(e.target.value)} className="w-full bg-black/50 border border-white/10 p-4 rounded-xl mb-6 outline-none focus:border-blue-500 text-lg font-bold" placeholder={isHolidayMode ? "휴일 명칭" : "내용 입력"}/>
                                    
                                    {!isHolidayMode && (
                                        <div className="space-y-6">
                                            <div className="flex flex-wrap md:flex-nowrap gap-2">
                                                {TAGS.map(t => (
                                                    <button key={t} onClick={() => setSelectedTag(t)} className={`flex-1 min-w-[60px] py-2 md:py-3 rounded-xl text-[10px] font-black transition-all ${selectedTag === t ? TAG_COLORS[t] : 'bg-white/5 text-white/20'}`}>{t}</button>
                                                ))}
                                            </div>
                                            <div className="bg-black/40 p-5 rounded-2xl border border-white/5">
                                                <span className="text-[10px] font-black text-white/20 block mb-4">반복 및 종료일 설정 (비워두면 당일만)</span>
                                                <input type="date" value={endDate} onChange={e => setEndDate(e.target.value)} className="bg-transparent border-b-2 border-white/10 w-full outline-none text-sm py-2 mb-4 focus:border-blue-500"/>
                                                <div className="flex justify-between mt-4">
                                                    {['일','월','화','수','목','금','토'].map((d, i) => (
                                                        <label key={i} className="flex flex-col items-center gap-2 cursor-pointer">
                                                            <span className={`text-[9px] md:text-[10px] font-black ${repeatDays.includes(i) ? 'text-blue-400' : 'text-white/30'}`}>{d}</span>
                                                            <input type="checkbox" checked={repeatDays.includes(i)} onChange={(e) => e.target.checked ? setRepeatDays([...repeatDays, i]) : setRepeatDays(repeatDays.filter(day => day !== i))} className="w-4 h-4 md:w-5 md:h-5"/>
                                                        </label>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                    <div className="flex gap-3 mt-8">
                                        <button onClick={handleSave} className="flex-[2] py-4 bg-blue-600 rounded-xl font-black text-white shadow-lg">저장</button>
                                        <button onClick={() => setAddingDate(null)} className="flex-1 py-4 bg-white/5 rounded-xl text-white/30 font-black">취소</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {showSettings && (
                            <div className="fixed inset-0 z-[310] bg-black/95 flex items-center justify-center p-4 no-drag">
                                <form onSubmit={(e)=>{ e.preventDefault(); localStorage.setItem('custom_firebase_config', JSON.stringify(Object.fromEntries(new FormData(e.target)))); window.location.reload(); }} className="bg-slate-900 p-6 md:p-10 rounded-3xl border border-white/10 w-full max-w-lg shadow-2xl">
                                    <h2 className="text-xl font-black text-white mb-6 flex justify-between items-center">Firebase 설정 <button type="button" onClick={()=>setShowSettings(false)} className="text-xs opacity-30">닫기</button></h2>
                                    {['apiKey', 'authDomain', 'projectId', 'storageBucket', 'messagingSenderId', 'appId'].map(k => (
                                        <input key={k} name={k} placeholder={k} defaultValue={fbConfig?.[k] || ''} className="w-full bg-black/40 border border-white/10 p-3 rounded-xl mb-2 text-xs text-white outline-none"/>
                                    ))}
                                    <div className="md:hidden mt-6 mb-2 border-t border-white/10 pt-4">
                                        <span className="text-white/40 text-xs font-bold mb-2 block">테마 & 투명도</span>
                                        <div className="flex gap-2 mb-4">
                                            {THEMES.map((t, idx) => (
                                                <button type="button" key={t.id} onClick={() => setCurrentThemeIdx(idx)} className={`flex-1 py-2 rounded-lg text-xs font-bold ${currentThemeIdx === idx ? 'bg-blue-600 text-white' : 'bg-white/10 text-white/50'}`}>{t.id}</button>
                                            ))}
                                        </div>
                                        <input type="range" min="0.1" max="1" step="0.05" value={opacity} onChange={e => setOpacity(e.target.value)} className="w-full accent-blue-600"/>
                                    </div>
                                    <button type="submit" className="w-full py-4 bg-blue-600 rounded-xl font-black text-white mt-4">저장 및 동기화</button>
                                </form>
                            </div>
                        )}
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
