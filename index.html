<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>바이브 캘린더</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body, html { 
            font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0; 
            background: transparent !important; 
            overflow: hidden; 
            height: 100vh; width: 100vw; 
        }

        .drag { -webkit-app-region: drag; }
        .no-drag { -webkit-app-region: no-drag !important; }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* 크기 조절 모드일 때 가이드 */
        .resizing { border: 2px solid rgba(59, 130, 246, 0.5) !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp, deleteApp, getApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        window.FirebaseSDK = { initializeApp, deleteApp, getApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore, collection, doc, setDoc, onSnapshot };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const TAG_COLORS = {
            '수업': 'bg-blue-500/20 text-blue-200 border-blue-500/30',
            '업무': 'bg-red-500/20 text-red-200 border-red-500/30',
            '개인': 'bg-emerald-500/20 text-emerald-200 border-emerald-500/30',
            '기타': 'bg-purple-500/20 text-purple-200 border-purple-500/30'
        };

        function App() {
            const calendarRef = useRef(null);
            const today = new Date();
            const [currentDate, setCurrentDate] = useState(new Date(today.getFullYear(), today.getMonth(), 1));
            const [events, setEvents] = useState({});
            const [filterTag, setFilterTag] = useState('All');
            const [opacity, setOpacity] = useState(0.85);
            const [showSettings, setShowSettings] = useState(false);
            const [addingDate, setAddingDate] = useState(null);
            const [inputText, setInputText] = useState('');
            const [selectedTag, setSelectedTag] = useState('수업');
            const [user, setUser] = useState(null);

            const isElectron = window.process && window.process.type === 'renderer';
            const savedConfig = localStorage.getItem('custom_firebase_config');
            const [fbConfig, setFbConfig] = useState(savedConfig ? JSON.parse(savedConfig) : null);

            // [핵심] 마우스 위치에 따른 상호작용 자동 감지
            useEffect(() => {
                if (!isElectron) return;
                const { ipcRenderer } = window.require('electron');

                const handleMouseMove = (e) => {
                    if (!calendarRef.current) return;
                    const rect = calendarRef.current.getBoundingClientRect();
                    const isInside = (
                        e.clientX >= rect.left && e.clientX <= rect.right &&
                        e.clientY >= rect.top && e.clientY <= rect.bottom
                    );
                    // 캘린더 영역 밖이면 바탕화면 아이콘 클릭 허용(true), 안이면 캘린더 클릭(false)
                    ipcRenderer.send('set-ignore-mouse', !isInside);
                };

                window.addEventListener('mousemove', handleMouseMove);
                return () => window.removeEventListener('mousemove', handleMouseMove);
            }, []);

            // Firebase 실시간 동기화 로직
            useEffect(() => {
                if (!fbConfig || !window.FirebaseSDK) return;
                const { initializeApp, getAuth, onAuthStateChanged, signInAnonymously } = window.FirebaseSDK;
                const app = initializeApp(fbConfig);
                const auth = getAuth(app);
                return onAuthStateChanged(auth, (u) => { 
                    setUser(u); 
                    if (!u) signInAnonymously(auth); 
                });
            }, [fbConfig]);

            useEffect(() => {
                if (!user || !fbConfig) return;
                const { getFirestore, collection, onSnapshot } = window.FirebaseSDK;
                return onSnapshot(collection(getFirestore(), 'artifacts', fbConfig.appId, 'users', user.uid, 'days'), (snap) => {
                    const newEvs = {};
                    snap.forEach(doc => { newEvs[doc.id] = doc.data().items || []; });
                    setEvents(newEvs);
                });
            }, [user, fbConfig]);

            const saveEvents = async (dateStr, items) => {
                if (!user) return;
                const { getFirestore, doc, setDoc } = window.FirebaseSDK;
                await setDoc(doc(getFirestore(), 'artifacts', fbConfig.appId, 'users', user.uid, 'days', dateStr), { items });
            };

            // 창 크기 조절 핸들러
            const startResizing = (e) => {
                if (!isElectron) return;
                const startX = e.clientX; const startY = e.clientY;
                const startW = window.innerWidth; const startH = window.innerHeight;
                const onMove = (m) => {
                    window.require('electron').ipcRenderer.send('resize-window', { 
                        width: startW + (m.clientX - startX), 
                        height: startH + (m.clientY - startY) 
                    });
                };
                const onUp = () => { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); };
                window.addEventListener('mousemove', onMove); window.addEventListener('mouseup', onUp);
            };

            const renderDays = () => {
                const year = currentDate.getFullYear(); const month = currentDate.getMonth();
                const days = [];
                const firstDay = new Date(year, month, 1).getDay();
                const daysInMonth = new Date(year, month + 1, 0).getDate();

                for (let i = 0; i < firstDay; i++) days.push(<div key={`p-${i}`} className="bg-white/5 opacity-10 rounded-2xl"></div>);
                for (let d = 1; d <= daysInMonth; d++) {
                    const dStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                    const dayEvs = (events[dStr] || []).filter(e => filterTag === 'All' || e.tag === filterTag);
                    const isToday = dStr === `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

                    days.push(
                        <div key={d} className="min-h-[90px] p-2 bg-white/5 border border-white/5 rounded-2xl relative group hover:bg-white/10 transition-all">
                            <div className="flex justify-between items-start mb-1">
                                <span className={`text-[10px] font-black ${isToday ? 'bg-blue-600 px-1.5 rounded-full text-white' : 'text-white/30'}`}>{d}</span>
                                <button onClick={() => setAddingDate(dStr)} className="opacity-0 group-hover:opacity-100 text-white/40 hover:text-white font-bold no-drag">+</button>
                            </div>
                            <div className="space-y-1 overflow-y-auto h-12 no-scrollbar">
                                {dayEvs.map(ev => (
                                    <div key={ev.id} className={`text-[9px] p-1 rounded border ${TAG_COLORS[ev.tag]} flex justify-between`}>
                                        <span className="truncate">{ev.text}</span>
                                        <button onClick={() => saveEvents(dStr, events[dStr].filter(i => i.id !== ev.id))} className="opacity-0 group-hover:opacity-100 no-drag ml-1">×</button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    );
                }
                return days;
            };

            return (
                <div className="h-screen w-screen flex items-center justify-center bg-transparent">
                    {/* 메인 캘린더 UI */}
                    <div 
                        ref={calendarRef}
                        style={{ backgroundColor: `rgba(15, 23, 42, ${opacity})` }}
                        className="w-[96%] h-[96%] flex flex-col rounded-[3rem] shadow-2xl overflow-hidden border border-white/10 backdrop-blur-xl relative transition-all duration-300"
                    >
                        {/* 헤더: 드래그 가능 */}
                        <div className="drag p-6 flex items-center justify-between bg-white/5 cursor-move">
                            <div className="no-drag flex items-center gap-6">
                                <h1 className="text-3xl font-black text-white tracking-tighter">{currentDate.getFullYear()}년 {currentDate.getMonth()+1}월</h1>
                                <div className="flex gap-1.5 bg-black/20 p-1 rounded-xl">
                                    {['All', ...Object.keys(TAG_COLORS)].map(t => (
                                        <button key={t} onClick={() => setFilterTag(t)} className={`px-2.5 py-1 rounded-lg text-[9px] font-bold transition-all ${filterTag === t ? 'bg-white/20 text-white' : 'text-white/30'}`}>{t}</button>
                                    ))}
                                </div>
                            </div>
                            <div className="no-drag flex items-center gap-4">
                                <button onClick={() => setShowSettings(true)} className="p-2 text-white/30 hover:text-white transition-all">⚙️</button>
                                <div className="flex bg-black/40 rounded-xl p-1">
                                    <button onClick={() => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth()-1, 1))} className="p-2 text-white/30 hover:text-white transition-all">◀</button>
                                    <button onClick={() => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth()+1, 1))} className="p-2 text-white/30 hover:text-white transition-all">▶</button>
                                </div>
                            </div>
                        </div>

                        {/* 요일 정보 */}
                        <div className="grid grid-cols-7 gap-3 px-8 py-3 bg-black/10 text-center text-[9px] font-black uppercase tracking-widest text-white/20">
                            {['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d => <div key={d}>{d}</div>)}
                        </div>

                        {/* 날짜 영역 */}
                        <div className="flex-1 px-8 pb-8 pt-2 overflow-y-auto custom-scrollbar no-drag">
                            <div className="grid grid-cols-7 gap-3 h-full">
                                {renderDays()}
                            </div>
                        </div>

                        {/* 크기 조절 손잡이 (우측 하단) */}
                        <div 
                            onMouseDown={startResizing}
                            className="absolute bottom-4 right-4 w-6 h-6 cursor-nwse-resize flex items-center justify-center text-white/10 hover:text-blue-400 no-drag transition-colors"
                        >◢</div>

                        {/* 일정 추가 모달 */}
                        {addingDate && (
                            <div className="absolute inset-0 bg-black/70 flex items-center justify-center z-50 no-drag backdrop-blur-md">
                                <div className="bg-slate-900 p-8 rounded-[2.5rem] border border-white/10 w-80 shadow-2xl">
                                    <h3 className="text-white font-bold mb-5">{addingDate} 일정 추가</h3>
                                    <input autoFocus value={inputText} onChange={e => setInputText(e.target.value)} onKeyDown={e => e.key === 'Enter' && (()=>{const id = Date.now().toString(); saveEvents(addingDate, [...(events[addingDate] || []), { id, text: inputText, tag: selectedTag }]); setAddingDate(null); setInputText('');})()} className="w-full bg-black/40 border border-white/10 p-3 rounded-xl text-white mb-4 outline-none focus:border-blue-500" placeholder="내용 입력 후 엔터"/>
                                    <div className="flex gap-2 mb-6">
                                        {Object.keys(TAG_COLORS).map(t => (
                                            <button key={t} onClick={() => setSelectedTag(t)} className={`flex-1 py-1.5 rounded-lg text-[9px] font-bold ${selectedTag === t ? TAG_COLORS[t] : 'bg-white/5 text-white/30'}`}>{t}</button>
                                        ))}
                                    </div>
                                    <button onClick={() => setAddingDate(null)} className="w-full py-3 bg-white/5 rounded-xl text-white/40 hover:text-white font-bold transition-all">취소</button>
                                </div>
                            </div>
                        )}

                        {/* 설정 모달 (투명도 조절) */}
                        {showSettings && (
                            <div className="absolute inset-0 bg-black/80 flex items-center justify-center z-[60] no-drag backdrop-blur-lg">
                                <div className="bg-slate-900 p-8 rounded-[3rem] border border-white/10 w-96 shadow-2xl">
                                    <h2 className="text-xl font-black mb-8 text-white tracking-tighter">배경 투명도: {Math.round(opacity * 100)}%</h2>
                                    <input type="range" min="0.1" max="1" step="0.05" value={opacity} onChange={e => setOpacity(parseFloat(e.target.value))} className="w-full h-1 bg-white/10 rounded-lg appearance-none cursor-pointer accent-blue-600 mb-8"/>
                                    <button onClick={() => setShowSettings(false)} className="w-full py-4 bg-white/5 rounded-2xl text-white/40 hover:text-white font-black transition-all">설정 닫기</button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
