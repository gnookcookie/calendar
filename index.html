<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>바이브 캘린더 Pro - 선생님용 통합판</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body, html { font-family: 'Pretendard', sans-serif; margin: 0; background: transparent !important; overflow: hidden; height: 100vh; width: 100vw; }
        .drag-area { -webkit-app-region: drag; }
        .no-drag { -webkit-app-region: no-drag !important; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input[type="checkbox"] { accent-color: #3b82f6; width: 16px; height: 16px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        window.FirebaseSDK = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut, getFirestore, collection, doc, setDoc, onSnapshot };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const BASIC_HOLIDAYS = { '01-01': '신정', '03-01': '삼일절', '05-05': '어린이날', '06-06': '현충일', '08-15': '광복절', '10-03': '개천절', '10-09': '한글날', '12-25': '성탄절' };
        const TAGS = ['수업', '업무', '개인', '기타'];
        const TAG_COLORS = { '수업': 'bg-blue-500/30 text-blue-100 border-blue-500/40', '업무': 'bg-red-500/30 text-red-100 border-red-500/40', '개인': 'bg-emerald-500/30 text-emerald-100 border-emerald-500/40', '기타': 'bg-slate-500/30 text-slate-100 border-slate-500/40' };
        const THEMES = [{ id: '다크', bg: 'rgba(15, 23, 42, ' }, { id: '미드나잇', bg: 'rgba(9, 9, 11, ' }, { id: '오션', bg: 'rgba(23, 37, 84, ' }];

        function App() {
            const calendarRef = useRef(null);
            const today = new Date();
            const [currentDate, setCurrentDate] = useState(new Date(today.getFullYear(), today.getMonth(), 1));
            const [events, setEvents] = useState({});
            const [customHolidays, setCustomHolidays] = useState({});
            const [opacity, setOpacity] = useState(0.85);
            const [currentThemeIdx, setCurrentThemeIdx] = useState(0);
            const [addingDate, setAddingDate] = useState(null);
            const [showSettings, setShowSettings] = useState(false);
            const [filterTag, setFilterTag] = useState('전체');
            
            const [inputText, setInputText] = useState('');
            const [selectedTag, setSelectedTag] = useState('수업');
            const [endDate, setEndDate] = useState('');
            const [repeatDays, setRepeatDays] = useState([]);
            const [isHolidayMode, setIsHolidayMode] = useState(false);
            const [user, setUser] = useState(null);

            const isElectron = window.process && window.process.type === 'renderer';
            const fbConfig = JSON.parse(localStorage.getItem('custom_firebase_config'));
            const theme = THEMES[currentThemeIdx];

            useEffect(() => {
                if (!isElectron) return;
                const { ipcRenderer } = window.require('electron');
                const handleMove = (e) => {
                    if (!calendarRef.current) return;
                    const r = calendarRef.current.getBoundingClientRect();
                    ipcRenderer.send('set-ignore-mouse', !(e.clientX >= r.left && e.clientX <= r.right && e.clientY >= r.top && e.clientY <= r.bottom));
                };
                window.addEventListener('mousemove', handleMove);
                return () => window.removeEventListener('mousemove', handleMove);
            }, []);

            useEffect(() => {
                if (!fbConfig || !window.FirebaseSDK) return;
                const { initializeApp, getAuth, onAuthStateChanged, signInAnonymously, getFirestore, collection, onSnapshot } = window.FirebaseSDK;
                const app = initializeApp(fbConfig);
                const auth = getAuth(app);
                const db = getFirestore(app);

                return onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    if (u) {
                        onSnapshot(collection(db, 'artifacts', fbConfig.appId, 'users', u.uid, 'days'), (snap) => {
                            const evs = {}; const hols = {};
                            snap.forEach(doc => {
                                const data = doc.data();
                                evs[doc.id] = data.items || [];
                                if (data.holidayName) hols[doc.id] = data.holidayName;
                            });
                            setEvents(evs); setCustomHolidays(hols);
                        });
                    } else { signInAnonymously(auth).catch(()=>{}); }
                });
            }, [fbConfig]);

            const saveToDB = async (dateStr, data) => {
                if (!user) return;
                const { getFirestore, doc, setDoc } = window.FirebaseSDK;
                await setDoc(doc(getFirestore(), 'artifacts', fbConfig.appId, 'users', user.uid, 'days', dateStr), data, { merge: true });
            };

            const getSessionNum = (text, targetDate) => {
                let count = 0;
                const sortedDates = Object.keys(events).sort();
                for (const d of sortedDates) {
                    const matched = (events[d] || []).filter(e => e.text === text && e.tag === '수업');
                    count += matched.length;
                    if (d === targetDate) break;
                }
                return count;
            };

            // [선생님 지적 반영 핵심 로직] 연속 일정 vs 반복 일정 스마트 구분
            const handleSave = async () => {
                if (!inputText) return;
                if (isHolidayMode) {
                    await saveToDB(addingDate, { holidayName: inputText });
                } else {
                    const start = new Date(addingDate);
                    const end = endDate ? new Date(endDate) : start;
                    let curr = new Date(start);
                    
                    while (curr <= end) {
                        const dStr = `${curr.getFullYear()}-${String(curr.getMonth()+1).padStart(2,'0')}-${String(curr.getDate()).padStart(2,'0')}`;
                        
                        // 요일이 0개 선택되었으면 '매일 연속', 선택되었으면 '해당 요일만'
                        const isEveryday = repeatDays.length === 0;
                        const isMatchingDay = repeatDays.includes(curr.getDay());

                        if (!endDate || isEveryday || isMatchingDay) {
                            const newItems = [...(events[dStr] || []), { id: Date.now() + Math.random(), text: inputText, tag: selectedTag, completed: false }];
                            await saveToDB(dStr, { items: newItems });
                        }
                        curr.setDate(curr.getDate() + 1);
                    }
                }
                setAddingDate(null); setInputText(''); setEndDate(''); setRepeatDays([]); setIsHolidayMode(false);
            };

            const toggleComplete = async (dateStr, eventId) => {
                const updatedItems = events[dateStr].map(item => 
                    item.id === eventId ? { ...item, completed: !item.completed } : item
                );
                await saveToDB(dateStr, { items: updatedItems });
            };

            const handleDragStart = (e, dateStr, item) => {
                e.dataTransfer.setData("item", JSON.stringify(item));
                e.dataTransfer.setData("fromDate", dateStr);
            };

            const handleDrop = async (e, toDateStr) => {
                const item = JSON.parse(e.dataTransfer.getData("item"));
                const fromDateStr = e.dataTransfer.getData("fromDate");
                if (fromDateStr === toDateStr) return;
                const fromItems = events[fromDateStr].filter(i => i.id !== item.id);
                await saveToDB(fromDateStr, { items: fromItems });
                const toItems = [...(events[toDateStr] || []), item];
                await saveToDB(toDateStr, { items: toItems });
            };

            const renderDays = () => {
                const year = currentDate.getFullYear(); const month = currentDate.getMonth();
                const days = [];
                const firstDay = new Date(year, month, 1).getDay();
                const daysInMonth = new Date(year, month + 1, 0).getDate();

                for (let i = 0; i < firstDay; i++) days.push(<div key={`p-${i}`} className="opacity-5 bg-white/10 rounded-3xl"></div>);
                for (let d = 1; d <= daysInMonth; d++) {
                    const dStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                    const dow = new Date(year, month, d).getDay();
                    const basicHol = BASIC_HOLIDAYS[`${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`];
                    const customHol = customHolidays[dStr];
                    const isRed = dow === 0 || basicHol || customHol;

                    const dayEvs = (events[dStr] || [])
                        .filter(e => filterTag === '전체' || e.tag === filterTag)
                        .sort((a, b) => a.completed - b.completed);

                    days.push(
                        <div key={d} onDragOver={(e) => e.preventDefault()} onDrop={(e) => handleDrop(e, dStr)} className="min-h-[125px] p-2 bg-white/5 border border-white/5 rounded-3xl relative group hover:bg-white/10 no-drag transition-all">
                            <div className="flex justify-between items-start mb-1">
                                <div className="flex flex-col">
                                    <span className={`text-[11px] font-black ${isRed ? 'text-red-400' : dow === 6 ? 'text-blue-400' : 'text-white/40'}`}>{d}</span>
                                    {(basicHol || customHol) && <span className="text-[9px] text-red-500 font-bold leading-tight mt-0.5">{basicHol || customHol}</span>}
                                </div>
                                <button onClick={() => setAddingDate(dStr)} className="opacity-0 group-hover:opacity-100 text-white/40 hover:text-white">+</button>
                            </div>
                            <div className="space-y-1 h-[70px] overflow-y-auto no-scrollbar">
                                {dayEvs.map(ev => (
                                    <div key={ev.id} draggable onDragStart={(e) => handleDragStart(e, dStr, ev)} className={`text-[9px] p-1.5 rounded border ${TAG_COLORS[ev.tag]} flex items-center gap-1.5 group/ev cursor-grab active:cursor-grabbing ${ev.completed ? 'opacity-40 grayscale' : ''}`}>
                                        <input type="checkbox" checked={ev.completed} onChange={() => toggleComplete(dStr, ev.id)} className="no-drag"/>
                                        <span className={`truncate flex-1 ${ev.completed ? 'line-through' : ''}`}>
                                            {ev.text} {ev.tag === '수업' ? `(${getSessionNum(ev.text, dStr)}차시)` : ''}
                                        </span>
                                        <button onClick={async () => await saveToDB(dStr, { items: events[dStr].filter(i => i.id !== ev.id) })} className="ml-1 opacity-0 group-hover/ev:opacity-100">×</button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    );
                }
                return days;
            };

            return (
                <div className="h-screen w-screen flex items-center justify-center bg-transparent">
                    {!fbConfig && (
                        <div className="fixed inset-0 z-[300] bg-slate-950 flex flex-col items-center justify-center">
                            <button onClick={()=>setShowSettings(true)} className="px-12 py-6 bg-blue-600 rounded-3xl font-black text-xl text-white shadow-2xl">연결 설정 시작하기</button>
                        </div>
                    )}

                    <div ref={calendarRef} style={{ backgroundColor: `${theme.bg}${opacity})` }} className="w-[98%] h-[98%] flex flex-col rounded-[4.5rem] shadow-2xl border border-white/10 backdrop-blur-3xl relative overflow-hidden">
                        <div className="drag-area p-10 pb-4 flex flex-col gap-6 bg-white/5 cursor-move">
                            <div className="flex items-center justify-between no-drag">
                                <div className="flex items-center gap-8 text-white">
                                    <h1 className="text-4xl font-black tracking-tighter italic">{currentDate.getFullYear()}년 {currentDate.getMonth()+1}월</h1>
                                    <div className="flex items-center gap-4 bg-black/40 px-5 py-2 rounded-2xl border border-white/5">
                                        <button onClick={() => setCurrentThemeIdx(p => (p+1)%THEMES.length)} className="text-[10px] font-black opacity-40 hover:opacity-100 uppercase tracking-widest">🎨 테마: {theme.id}</button>
                                        <input type="range" min="0.1" max="1" step="0.05" value={opacity} onChange={e => setOpacity(e.target.value)} className="w-24 h-1 appearance-none bg-white/10 rounded-full accent-blue-600"/>
                                        <button onClick={() => setShowSettings(true)} className="text-[10px] font-black opacity-40 hover:opacity-100">⚙️ 설정</button>
                                    </div>
                                </div>
                                <div className="flex items-center gap-4">
                                    {user && (
                                        <div className="flex items-center gap-3 pr-4 border-r border-white/10">
                                            <img src={user.photoURL} className="w-10 h-10 rounded-full border-2 border-blue-500/30"/>
                                            <button onClick={async () => { await window.FirebaseSDK.signOut(window.FirebaseSDK.getAuth()); window.location.reload(); }} className="text-[9px] font-black text-red-400">로그아웃</button>
                                        </div>
                                    )}
                                    {!user && <button onClick={async () => { const { getAuth, signInWithPopup, GoogleAuthProvider } = window.FirebaseSDK; await signInWithPopup(getAuth(), new GoogleAuthProvider()); }} className="px-6 py-2 bg-blue-600 rounded-xl font-bold text-xs text-white">Google 로그인</button>}
                                    <div className="flex bg-black/50 rounded-2xl p-1 shadow-2xl border border-white/5">
                                        <button onClick={() => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth()-1, 1))} className="p-3 text-white/20 hover:text-white transition-all">◀</button>
                                        <button onClick={() => setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth()+1, 1))} className="p-3 text-white/20 hover:text-white transition-all">▶</button>
                                    </div>
                                </div>
                            </div>
                            
                            <div className="no-drag flex items-center gap-2 border-t border-white/5 pt-4">
                                <span className="text-[10px] font-black text-white/20 uppercase mr-2 tracking-widest">필터:</span>
                                {['전체', ...TAGS].map(tag => (
                                    <button key={tag} onClick={() => setFilterTag(tag)} className={`px-4 py-1.5 rounded-xl text-[10px] font-black transition-all border ${filterTag === tag ? 'bg-white/20 text-white border-white/20 shadow-lg' : 'bg-black/20 text-white/30 border-transparent hover:text-white/60'}`}>{tag}</button>
                                ))}
                            </div>
                        </div>

                        <div className="flex-1 p-10 pt-4 overflow-y-auto custom-scrollbar no-drag">
                            <div className="grid grid-cols-7 gap-3">{renderDays()}</div>
                        </div>

                        <div onMouseDown={(e) => {
                            const sX = e.clientX; const sY = e.clientY; const sW = window.innerWidth; const sH = window.innerHeight;
                            const onM = (m) => window.require('electron').ipcRenderer.send('resize-window', { width: sW+(m.clientX-sX), height: sH+(m.clientY-sY) });
                            const onU = () => { window.removeEventListener('mousemove', onM); window.removeEventListener('mouseup', onU); };
                            window.addEventListener('mousemove', onM); window.addEventListener('mouseup', onU);
                        }} className="absolute bottom-8 right-8 w-12 h-12 cursor-nwse-resize text-white/5 hover:text-blue-500 flex items-end justify-end p-2 transition-all">◢</div>

                        {addingDate && (
                            <div className="absolute inset-0 bg-black/85 flex items-center justify-center z-50 no-drag backdrop-blur-2xl">
                                <div className="bg-slate-900 p-10 rounded-[4rem] border border-white/10 w-[550px] shadow-2xl text-white">
                                    <div className="flex justify-between items-center mb-8">
                                        <h3 className="text-2xl font-black italic tracking-tighter">{addingDate} 일정 추가</h3>
                                        <button onClick={() => setIsHolidayMode(!isHolidayMode)} className={`px-4 py-1.5 rounded-full text-[10px] font-black border transition-all ${isHolidayMode ? 'bg-red-600 border-red-600' : 'border-white/10 text-white/20'}`}>{isHolidayMode ? '휴일 모드 ON' : '휴일 등록'}</button>
                                    </div>
                                    <input autoFocus value={inputText} onChange={e => setInputText(e.target.value)} className="w-full bg-black/50 border border-white/10 p-5 rounded-2xl mb-8 outline-none focus:border-blue-500 text-xl font-bold" placeholder={isHolidayMode ? "휴일 명칭" : "내용 입력"}/>
                                    {!isHolidayMode && (
                                        <div className="space-y-8">
                                            <div className="flex gap-2">
                                                {TAGS.map(t => (
                                                    <button key={t} onClick={() => setSelectedTag(t)} className={`flex-1 py-3 rounded-2xl text-[11px] font-black transition-all ${selectedTag === t ? TAG_COLORS[t] : 'bg-white/5 text-white/20 hover:bg-white/10'}`}>{t}</button>
                                                ))}
                                            </div>
                                            <div className="bg-black/40 p-6 rounded-[2.5rem] border border-white/5">
                                                <span className="text-[11px] font-black text-white/20 block mb-6 uppercase tracking-widest">연속 및 반복 설정</span>
                                                <div className="mb-4">
                                                    <span className="text-[10px] text-white/40 block mb-3 ml-2 italic">종료일을 지정하세요. (요일을 고르지 않으면 '매일 연속'으로 저장됩니다)</span>
                                                    <input type="date" value={endDate} onChange={e => setEndDate(e.target.value)} className="bg-transparent border-b-2 border-white/10 w-full outline-none text-sm py-2 mb-2 focus:border-blue-500"/>
                                                </div>
                                                <div className="flex justify-between px-2">
                                                    {['일','월','화','수','목','금','토'].map((d, i) => (
                                                        <label key={i} className="flex flex-col items-center gap-2 cursor-pointer group">
                                                            <span className={`text-[10px] font-black ${repeatDays.includes(i) ? 'text-blue-400' : 'text-white/20'}`}>{d}</span>
                                                            <input type="checkbox" checked={repeatDays.includes(i)} onChange={(e) => e.target.checked ? setRepeatDays([...repeatDays, i]) : setRepeatDays(repeatDays.filter(day => day !== i))} className="w-5 h-5"/>
                                                        </label>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                    <div className="flex gap-4 mt-10">
                                        <button onClick={handleSave} className="flex-[2] py-5 bg-blue-600 rounded-[2rem] font-black shadow-xl hover:scale-105 active:scale-95 transition-all">저장</button>
                                        <button onClick={() => setAddingDate(null)} className="flex-1 py-5 bg-white/5 rounded-[2rem] text-white/20 font-black">취소</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {showSettings && (
                            <div className="fixed inset-0 z-[310] bg-black/95 backdrop-blur-2xl flex items-center justify-center p-4 no-drag">
                                <form onSubmit={(e)=>{ e.preventDefault(); localStorage.setItem('custom_firebase_config', JSON.stringify(Object.fromEntries(new FormData(e.target)))); window.location.reload(); }} className="bg-slate-900 p-12 rounded-[4rem] border border-white/10 w-[550px] shadow-2xl">
                                    <h2 className="text-2xl font-black text-white mb-8 flex justify-between items-center">Firebase 설정 <button type="button" onClick={()=>setShowSettings(false)} className="text-xs opacity-20">닫기</button></h2>
                                    {['apiKey', 'authDomain', 'projectId', 'storageBucket', 'messagingSenderId', 'appId'].map(k => (
                                        <input key={k} name={k} placeholder={k} defaultValue={fbConfig?.[k] || ''} className="w-full bg-black/40 border border-white/10 p-4 rounded-2xl mb-2 text-sm text-white outline-none focus:border-blue-500"/>
                                    ))}
                                    <button type="submit" className="w-full py-5 bg-blue-600 rounded-2xl font-black text-white mt-6 shadow-xl">설정 저장 및 동기화</button>
                                </form>
                            </div>
                        )}
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
